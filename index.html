<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arithmatic Lifestyle Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #2b2b2b;
      --frame-bg: #111;
      --overlay-bg: rgba(0,0,0,0.85);
      --btn-black: #111;
      --btn-white: #fff;
    }

    body {
      margin: 0;
      font-family: 'Bubblegum Sans', cursive;
      background: var(--page-bg);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 18px;
    }

    h1, h2, h3, button, input, select, label, p, div {
      font-family: 'Bubblegum Sans', cursive;
    }

    /* ====== GAME FRAME ====== */
    .game-frame {
      width: min(900px, 100%);
      aspect-ratio: 170 / 107;
      background: var(--frame-bg);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 12px 50px rgba(0,0,0,0.45);
    }

    .topbar {
      position: absolute;
      left: 0; right: 0; top: 0;
      z-index: 50;
      height: 48px;
      background: var(--overlay-bg);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      box-sizing: border-box;
      gap: 12px;
    }

    .hearts { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; line-height: 1; user-select: none; }
    .heart  { width: 22px; height: 22px; object-fit: contain; image-rendering: pixelated; }
    .heart.unfilled { filter: invert(1); }
    .bank   { font-weight: 700; white-space: nowrap; text-align: right; }
    .tiny   { font-size: 12px; opacity: 0.85; }

    .layout   { position: absolute; inset: 0; }

    .side-nav {
      position: absolute;
      left: 14px; top: 64px;
      width: 130px;
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      border: 0; border-radius: 12px;
      padding: 10px 10px;
      cursor: pointer; font-size: 16px;
      background: #f2f2f2; color: #111;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    }
    .nav-btn.active { outline: 3px solid rgba(255,105,180,0.6); }

    .main { position: absolute; inset: 0; overflow: hidden; }
    .page { position: absolute; inset: 0; display: none; padding: 12px; }
    .page.active { display: block; }

    /* ====== CALCULATOR ====== */
    .calculator-stage { position: absolute; inset: 0; display: grid; place-items: center; padding: 0; }
    .calc { position: relative; height: 100%; width: auto; aspect-ratio: 170/107; }
    .calc img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; image-rendering: pixelated;
      user-select: none; -webkit-user-drag: none;
    }
    .calc-display {
      position: absolute;
      left: 34%; bottom: 52%; top: auto; width: 54%; height: 18%;
      z-index: 7; color: #111;
      display: flex; flex-direction: column; justify-content: center;
      gap: 4px; padding: 6px 10px; box-sizing: border-box;
    }
    .equation   { font-size: 36px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .answerline { font-size: 20px; font-weight: 700; line-height: 1.1; }
    .feedback   { font-size: 14px; min-height: 18px; }
    .keypad {
      position: absolute;
      left: 34%; bottom: 6%; top: auto; width: 54%; height: 44%;
      z-index: 6;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 0.9fr;
      grid-template-rows: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }
    .key { border: 0; border-radius: 14px; cursor: pointer; font-size: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
    .key.num    { background: var(--btn-black); color: #fff; }
    .key.action { background: var(--btn-black); color: #fff; font-size: 18px; }
    .key.mode   { background: var(--btn-white); color: #111; font-weight: 800; }
    .key.mode.active { outline: 4px solid rgba(0,0,0,0.35); }
    .k1{grid-column:1;grid-row:1} .k2{grid-column:2;grid-row:1} .k3{grid-column:3;grid-row:1}
    .k4{grid-column:1;grid-row:2} .k5{grid-column:2;grid-row:2} .k6{grid-column:3;grid-row:2}
    .k7{grid-column:1;grid-row:3} .k8{grid-column:2;grid-row:3} .k9{grid-column:3;grid-row:3}
    .k0{grid-column:2;grid-row:4}
    .kPlus{grid-column:4;grid-row:1} .kMinus{grid-column:4;grid-row:2} .kBoth{grid-column:4;grid-row:3}
    .kClear{grid-column:1;grid-row:4} .kOK{grid-column:3/5;grid-row:4}

    /* ====== BANK ====== */
    .bank-panel {
      width: min(500px, 90%);
      margin: 40px auto;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 14px;
      color: #fff;
    }
    #room-page .bank-panel { width: min(760px, 100%); margin: 40px auto; }
    .bank-panel h2 { margin: 0 0 8px; }
    .tx-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; }
    .tx-btn  { border: 0; border-radius: 12px; padding: 8px 10px; cursor: pointer; background: #f2f2f2; color: #111; }
    #tx-list { margin-top: 10px; padding: 0; list-style: none; }
    #tx-list li { margin: 8px 0; font-weight: 800; }

    /* ====== STORE ====== */
    .store-panel {
      width: min(480px, 90%);
      margin: 52px auto 0;
      height: calc(100% - 72px);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 12px;
      color: #fff;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .store-panel h2 { margin: 0 0 8px; flex-shrink: 0; }
    .shop-scroll {
      flex: 1; overflow-y: auto; padding: 2px 2px 4px;
    }
    .shop-scroll::-webkit-scrollbar { width: 5px; }
    .shop-scroll::-webkit-scrollbar-thumb { background: rgba(255,105,180,0.45); border-radius: 3px; }
    .shop-item {
      display: flex; align-items: center; gap: 9px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px; padding: 7px 9px; margin-bottom: 6px;
    }
    .shop-icon {
      width: 38px; height: 38px;
      object-fit: contain; image-rendering: pixelated;
      border-radius: 6px; background: rgba(255,255,255,0.12); flex-shrink: 0;
    }
    .shop-info { flex: 1; min-width: 0; }
    .shop-name { font-size: 13px; }
    .shop-desc { font-size: 10px; opacity: 0.6; margin-top: 1px; }
    .buy-btn {
      flex-shrink: 0; border: 0; border-radius: 9px; padding: 5px 12px;
      cursor: pointer; background: #ff69b4; color: #fff;
      font-family: 'Bubblegum Sans', cursive; font-size: 13px; white-space: nowrap;
    }
    .buy-btn:disabled {
      background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.5); cursor: default;
    }

    /* ====== ROOM STAGE ====== */
    .room-stage {
      position: relative;
      width: min(680px, 100%);
      aspect-ratio: 170 / 107;
      border-radius: 16px; overflow: hidden;
      margin: 0 auto;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.05);
      image-rendering: pixelated;
    }

    #character-layer {
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
    }
    #character-layer .char-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; object-position: right bottom;
      image-rendering: pixelated; user-select: none; -webkit-user-drag: none;
    }
    /* Base stacking */
    #character-layer .char-hair  { z-index: 10; }
    #character-layer .char-body  { z-index: 20; }
    #character-layer .char-eyes  { z-index: 30; }
    #character-layer .char-smile { z-index: 40; }
    /* Equipped overlays */
    #char-hair-overlay  { z-index: 11; }
    #char-body-overlay  { z-index: 21; }
    #char-legs-overlay  { z-index: 22; }
    #char-eyes-overlay  { z-index: 31; }
    #char-smile-overlay { z-index: 41; }

    .room-stage img {
      position: absolute; right: 0; bottom: 0; left: auto; top: auto;
      width: 100%; height: auto; object-fit: contain;
      image-rendering: pixelated; user-select: none; -webkit-user-drag: none;
    }
    #room-bg           { z-index: 1; }
    .character-layer   { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
    .items-layer       { position: absolute; inset: 0; z-index: 3; }
    .closet-hitbox     {
      position: absolute; z-index: 4;
      left: 0%; top: 10%; width: 22%; height: 78%;
      background: transparent; border: none; cursor: pointer;
    }

    /* Character drop zone for consumable drag */
    #char-drop-zone {
      position: absolute; right: 2%; top: 5%; width: 70%; height: 90%;
      z-index: 6; pointer-events: none;
      border-radius: 10px; box-sizing: border-box;
      border: 2px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    #char-drop-zone.drag-active {
      pointer-events: all;
      background: rgba(255,105,180,0.12);
      border-color: rgba(255,105,180,0.75);
      border-style: dashed;
    }

    /* ====== CLOSET OVERLAY ====== */
    #closet-overlay {
      position: absolute; inset: 0; z-index: 10; display: none;
    }
    .closet-bg-img {
      position: absolute; left: 0; bottom: 0; width: 100%; height: 100%;
      object-fit: contain; object-position: left bottom;
      image-rendering: pixelated; pointer-events: none;
      user-select: none; -webkit-user-drag: none;
    }
    #closet-close-btn {
      position: absolute; top: 5px; left: calc(23% + 6px);
      z-index: 12; background: rgba(0,0,0,0.6); color: #fff;
      border: 0; border-radius: 50%;
      width: 20px; height: 20px; cursor: pointer;
      font-size: 12px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    #closet-inv-panel {
      position: absolute; left: 1.5%; top: 6%; width: 22%; height: 82%;
      overflow-y: auto; z-index: 11;
      padding: 4px 3px; box-sizing: border-box;
      display: flex; flex-direction: column; gap: 3px;
    }
    #closet-inv-panel::-webkit-scrollbar { width: 3px; }
    #closet-inv-panel::-webkit-scrollbar-thumb { background: rgba(255,105,180,0.5); border-radius: 2px; }
    .closet-section-label {
      color: #fff; font-size: 9px; opacity: 0.8;
      text-align: center; letter-spacing: 0.4px; margin: 3px 0 1px;
    }
    .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .inv-tile {
      position: relative; background: rgba(255,255,255,0.20);
      border-radius: 6px; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid transparent; overflow: hidden;
      transition: filter 0.15s, border-color 0.15s;
    }
    .inv-tile:hover { border-color: rgba(255,105,180,0.7); }
    .inv-tile img {
      width: 72%; height: 72%; object-fit: contain;
      image-rendering: pixelated; pointer-events: none;
    }
    /* Darkened = equipped/applied */
    .inv-tile.equipped { filter: brightness(0.42); border-color: #ff69b4 !important; }
    .inv-tile.equipped::after {
      content: '✓'; position: absolute; top: 1px; right: 3px;
      font-size: 9px; color: #ff69b4; filter: brightness(2.5);
    }
    .badge {
      position: absolute; bottom: 1px; right: 1px;
      background: #ff69b4; color: #fff; border-radius: 50%;
      width: 13px; height: 13px; font-size: 8px;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .inv-tile[draggable="true"] { cursor: grab; }
    .inv-tile[draggable="true"]:active { cursor: grabbing; }
    .inv-empty { color: rgba(255,255,255,0.45); font-size: 10px; text-align: center; padding: 8px 4px; }

    /* ====== MINI CALC ROOM OVERLAY ====== */
    #room-calc-overlay {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      z-index: 4;
      pointer-events: none; /* clicks pass through to hotspot below */
      transition: transform 0.2s ease;
    }
    /* The clickable hotspot sits over the pink rectangle (bottom-right of image) */
    #room-calc-hotspot {
      position: absolute;
      /* Pink rect measured at 92.9-97.6% left, 48.6-53.3% top */
      left: 91%;
      top: 46%;
      width: 8%;
      height: 10%;
      z-index: 9;
      cursor: pointer;
      background: transparent;
      border: none;
    }
    /* When hovering the hotspot, scale the whole overlay image up */
    .room-calc-wrap:hover #room-calc-overlay {
      transform: scale(1.22);
      transform-origin: 95% 51%;
    }
    .room-calc-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .room-calc-wrap #room-calc-hotspot { pointer-events: all; }

    /* ====== PLACED ROOM ITEMS ====== */
    .placed-item {
      position: absolute; width: 9%;
      cursor: grab; image-rendering: pixelated; z-index: 4;
      user-select: none; transition: filter 0.15s;
    }
    .placed-item:hover { filter: drop-shadow(0 0 4px #ff69b4); }

    /* ====== BLIND BOX REVEAL ====== */
    #blindbox-reveal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.88);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #blindbox-reveal.active { display: flex; }
    #blindbox-anim-img { width: 110px; height: 110px; object-fit: contain; image-rendering: pixelated; }
    @keyframes wiggle {
      0%  { transform: rotate(-10deg) scale(1.00); }
      20% { transform: rotate(10deg)  scale(1.12); }
      40% { transform: rotate(-8deg)  scale(1.06); }
      60% { transform: rotate(8deg)   scale(1.10); }
      80% { transform: rotate(-6deg)  scale(1.04); }
      100%{ transform: rotate(0deg)   scale(1.00); }
    }
    @keyframes popIn {
      0%  { transform: scale(0.2) rotate(-15deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(5deg);   opacity: 1; }
      100%{ transform: scale(1.0) rotate(0);      opacity: 1; }
    }
    #blindbox-anim-img.wiggling { animation: wiggle 0.4s ease-in-out infinite; }
    #blindbox-anim-img.popping  { animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
    #blindbox-reveal-name {
      color: #fff; font-size: 24px; opacity: 0; transition: opacity 0.4s;
    }
    #blindbox-reveal-name.show { opacity: 1; }
    #blindbox-close-btn {
      display: none; border: 0; border-radius: 20px;
      padding: 10px 28px; background: #ff69b4; color: #fff;
      font-family: 'Bubblegum Sans', cursive; font-size: 16px; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Blind box reveal (fixed, on top of everything) -->
  <div id="blindbox-reveal" onclick="closeBlindboxReveal()">
    <img id="blindbox-anim-img" src="blind_box_icon.png" alt="Blind Box" />
    <div id="blindbox-reveal-name"></div>
    <button id="blindbox-close-btn" onclick="closeBlindboxReveal()">Yay! &#x1F389;</button>
  </div>

  <div class="game-frame">

    <div class="topbar">
      <div>
        <div class="hearts" id="hearts"></div>
        <div class="tiny" id="hearts-hint">Get 10 hearts &#x2192; +$1</div>
      </div>
      <div class="bank">
        <div>Available: $<span id="money-display">0</span></div>
        <div style="opacity:0.6;">Pending: $<span id="pending-display">0</span></div>
      </div>
    </div>

    <div class="layout">
      <div class="side-nav">
        <button class="nav-btn active" id="nav-calc"  onclick="showPage('game-page')">Calculator</button>
        <button class="nav-btn"        id="nav-bank"  onclick="showPage('bank-page')">Bank</button>
        <button class="nav-btn"        id="nav-store" onclick="showPage('store-page')">Shop</button>
        <button class="nav-btn"        id="nav-room"  onclick="showPage('room-page')">Room</button>
      </div>

      <div class="main">

        <!-- CALCULATOR -->
        <div id="game-page" class="page active">
          <div class="calculator-stage">
            <div class="calc" aria-label="Calculator">
              <img src="calculator_ui.png" alt="Calculator UI" />
              <div class="calc-display" aria-live="polite">
                <div class="equation" id="equation-text">&#x2026;</div>
                <div class="answerline" id="answer-text"> </div>
                <div class="feedback"  id="feedback-text"></div>
              </div>
              <div class="keypad" aria-label="Keypad">
                <button class="key num k1" onclick="pressDigit(1)">1</button>
                <button class="key num k2" onclick="pressDigit(2)">2</button>
                <button class="key num k3" onclick="pressDigit(3)">3</button>
                <button class="key num k4" onclick="pressDigit(4)">4</button>
                <button class="key num k5" onclick="pressDigit(5)">5</button>
                <button class="key num k6" onclick="pressDigit(6)">6</button>
                <button class="key num k7" onclick="pressDigit(7)">7</button>
                <button class="key num k8" onclick="pressDigit(8)">8</button>
                <button class="key num k9" onclick="pressDigit(9)">9</button>
                <button class="key action kClear" onclick="clearAnswer()">Clear</button>
                <button class="key num k0"        onclick="pressDigit(0)">0</button>
                <button class="key action kOK"    onclick="submitAnswer()">OK</button>
                <button class="key mode kPlus"  id="mode-plus"  onclick="setMode('add')">+</button>
                <button class="key mode kMinus" id="mode-minus" onclick="setMode('sub')">&minus;</button>
                <button class="key mode kBoth"  id="mode-both"  onclick="setMode('mix')">Both</button>
              </div>
            </div>
          </div>
        </div>

        <!-- BANK -->
        <div id="bank-page" class="page">
          <div class="bank-panel">
            <h2>The Bank</h2>
            <div class="tiny">(Progress saves automatically!)</div>
            <div class="tx-head">
              <h3 style="margin:0;">Transactions</h3>
              <button class="tx-btn" id="tx-toggle" onclick="toggleTxView()">View All</button>
            </div>
            <div class="tiny" id="tx-subtitle">Showing 10 most recent.</div>
            <ul id="tx-list"></ul>
          </div>
        </div>

        <!-- STORE -->
        <div id="store-page" class="page">
          <div class="store-panel">
            <h2>The Shop &#x2728;</h2>
            <div id="shop-list" class="shop-scroll"></div>
          </div>
        </div>

        <!-- ROOM -->
        <div id="room-page" class="page" style="padding:0;">
            <div class="room-stage" id="room-stage" style="width:100%;height:100%;aspect-ratio:unset;border-radius:0;border:none;margin:0;">
              <img id="room-bg" src="room_ui.png" alt="Room background" />

              <div class="character-layer" id="character-layer" aria-hidden="true">
                <img class="char-img char-hair"  src="base_hair.png" alt="" />
                <img class="char-img" id="char-hair-overlay"  src="" alt="" style="display:none;" />
                <img class="char-img char-body"  src="body-and-base-outfit.png" alt="" />
                <img class="char-img" id="char-body-overlay"  src="" alt="" style="display:none;" />
                <img class="char-img" id="char-legs-overlay"  src="" alt="" style="display:none;" />
                <img class="char-img char-eyes"  src="base_eye.png" alt="" />
                <img class="char-img" id="char-eyes-overlay"  src="" alt="" style="display:none;" />
                <img class="char-img char-smile" src="base_smile.png" alt="" />
                <img class="char-img" id="char-smile-overlay" src="" alt="" style="display:none;" />
              </div>

              <div class="items-layer" id="items-layer"></div>

              <!-- Mini calculator overlay + clickable hotspot -->
              <div class="room-calc-wrap">
                <button id="room-calc-hotspot" onclick="showPage('game-page')" title="Go to Calculator"></button>
                <img id="room-calc-overlay" src="mini_calc_icon.png" alt="" />
              </div>

              <button class="closet-hitbox" id="closet-hitbox" type="button" aria-label="Open closet"></button>

              <!-- Drop zone for dragging beauty items onto character -->
              <div id="char-drop-zone"></div>

              <!-- Closet overlay panel -->
              <div id="closet-overlay">
                <img class="closet-bg-img" src="closet_open.png" alt="" />
                <button id="closet-close-btn" onclick="closeCloset()" title="Close">&#x2715;</button>
                <div id="closet-inv-panel"></div>
              </div>

            </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ================================================================
    //  ITEM DEFINITIONS
    // ================================================================
    //  type 'wearable'   — click in closet to toggle on/off (owned once)
    //  type 'consumable' — drag onto character to apply (unlimited, uses up 1)
    //  type 'blindbox'   — click in closet to open with reveal animation
    //  (keychains are room items, won from blind boxes, drag into room)

    const SHOP_ITEMS = [
      { id:'blind_box',       name:'Blind Box',       price:0, type:'blindbox',   icon:'blind_box_icon.png',        desc:'Mystery keychain inside!',         unlimited:true  },
      { id:'pink_contacts',   name:'Pink Contacts',   price:0, type:'wearable',   slot:'eyes',  icon:'pink_contacts_icon.png',   src:'pink_contacts.png',   desc:'Own once, toggle in closet.',     unlimited:false },
      { id:'pink_lipgloss',   name:'Pink Lip Gloss',  price:0, type:'consumable', slot:'smile', icon:'pink_lipgloss_icon.png',   src:'pink_lipgloss.png',   desc:'Drag onto character to apply.',   unlimited:true  },
      { id:'heart_shirt',     name:'Heart Shirt',     price:0, type:'wearable',   slot:'body',  icon:'heart_shirt_icon.png',     src:'heart_shirt.png',     desc:'Own once, toggle in closet.',     unlimited:false },
      { id:'black_tank',      name:'Black Tank Top',  price:0, type:'wearable',   slot:'body',  icon:'black_tank_icon.png',      src:'black_tank.png',      desc:'Own once, toggle in closet.',     unlimited:false },
      { id:'pink_tank',       name:'Pink Tank Top',   price:0, type:'wearable',   slot:'body',  icon:'pink_tank_icon.png',       src:'pink_tank.png',       desc:'Own once, toggle in closet.',     unlimited:false },
      { id:'green_tank',      name:'Green Tank Top',  price:0, type:'wearable',   slot:'body',  icon:'green_tank_icon.png',      src:'green_tank.png',      desc:'Own once, toggle in closet.',     unlimited:false },
      { id:'pink_highlights', name:'Pink Highlights', price:0, type:'consumable', slot:'hair',  icon:'pink_highlights_icon.png', src:'pink_highlights.png', desc:'Drag onto character to apply.',   unlimited:true  },
      { id:'pink_hair_dye',   name:'Pink Hair Dye',   price:0, type:'consumable', slot:'hair',  icon:'pink_hair_icon.png',       src:'pink_hair.png',       desc:'Drag onto character to apply.',   unlimited:true  },
      { id:'green_hair_dye',  name:'Green Hair Dye',  price:0, type:'consumable', slot:'hair',  icon:'green_hair_icon.png',      src:'green_hair.png',      desc:'Drag onto character to apply.',   unlimited:true  },
      { id:'black_shorts',    name:'Black Shorts',    price:0, type:'wearable',   slot:'legs',  icon:'black_shorts_icon.png',    src:'black_shorts.png',    desc:'Own once, toggle in closet.',     unlimited:false },
      { id:'bluejeans',       name:'Blue Jeans',      price:0, type:'wearable',   slot:'legs',  icon:'bluejeans_icon.png',       src:'bluejeans.png',       desc:'Own once, toggle in closet.',     unlimited:false },
    ];

    const KEYCHAIN_ITEMS = [
      { id:'rain_keychain',   name:'Rain',   icon:'rain_keychain.png',   src:'rain_keychain.png'   },
      { id:'check_keychain',  name:'Check',  icon:'check_keychain.png',  src:'check_keychain.png'  },
      { id:'spunk_keychain',  name:'Spunk',  icon:'spunk_keychain.png',  src:'spunk_keychain.png'  },
      { id:'punk_keychain',   name:'Punk',   icon:'punk_keychain.png',   src:'punk_keychain.png'   },
      { id:'jillee_keychain', name:'Jillee', icon:'jillee_keychain.png', src:'jillee_keychain.png' },
      { id:'mira_keychain',   name:'Mira',   icon:'mira_keychain.png',   src:'mira_keychain.png'   },
    ];

    function getItemDef(id) {
      return SHOP_ITEMS.find(i => i.id === id) || KEYCHAIN_ITEMS.find(i => i.id === id) || null;
    }

    // ================================================================
    //  GAME STATE
    // ================================================================

    // Economy (existing)
    let money = 0, heartsFilled = 0;
    let pendingDollarsThisHour = 0, pendingHourKey = null;
    let transactions = [];
    let tierIndex = 0, rightStreak = 0, wrongStreak = 0;
    let expectedAnswer = 0, equationText = '', triesThisQuestion = 0;
    let answerDigits = '', mode = 'add', isNextMixAdd = true;
    const HEARTS_PER_DOLLAR = 10, MAX_TRIES = 3;
    const ranges = [[0,5],[6,10],[11,20],[21,40],[41,59],[60,70],[71,81],[82,92],[93,100]];

    // Inventory / character state (new)
    let inventory = {};         // { itemId: count }
    let ownedItems = new Set(); // ids that are one-time-owned
    let equipped   = { hair:null, body:null, legs:null, eyes:null, smile:null };
    let roomItems  = [];        // [{ id, instanceId, xPct, yPct }]
    let instanceCounter = 0;

    // ================================================================
    //  SAVE / LOAD
    // ================================================================

    const SAVE_KEY = 'alg_save_v1';

    function saveGame() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          money, heartsFilled, pendingDollarsThisHour, pendingHourKey,
          transactions, tierIndex, rightStreak, wrongStreak, mode,
          inventory, ownedItems:[...ownedItems], equipped, roomItems, instanceCounter
        }));
      } catch(e) { /* storage full / private mode */ }
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const d = JSON.parse(raw);
        money                  = d.money ?? 0;
        heartsFilled           = d.heartsFilled ?? 0;
        pendingDollarsThisHour = d.pendingDollarsThisHour ?? 0;
        pendingHourKey         = d.pendingHourKey ?? null;
        transactions           = (d.transactions ?? []).map(tx => ({...tx, at: new Date(tx.at)}));
        tierIndex              = d.tierIndex ?? 0;
        rightStreak            = d.rightStreak ?? 0;
        wrongStreak            = d.wrongStreak ?? 0;
        mode                   = d.mode ?? 'add';
        inventory              = d.inventory ?? {};
        ownedItems             = new Set(d.ownedItems ?? []);
        equipped               = { hair:null, body:null, legs:null, eyes:null, smile:null, ...(d.equipped ?? {}) };
        roomItems              = d.roomItems ?? [];
        instanceCounter        = d.instanceCounter ?? 0;
      } catch(e) { /* corrupted save — start fresh */ }
    }

    // ================================================================
    //  NAV / PAGE SWITCHING
    // ================================================================

    const navMap = { 'game-page':'nav-calc', 'bank-page':'nav-bank', 'store-page':'nav-store', 'room-page':'nav-room' };

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      Object.values(navMap).forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById(navMap[pageId]).classList.add('active');
      const inRoom = pageId === 'room-page';
      document.querySelector('.side-nav').style.display = inRoom ? 'none' : '';
      document.querySelector('.topbar').style.display   = inRoom ? 'none' : '';
      renderTopBar();
      if (pageId === 'bank-page')  renderBank();
      if (pageId === 'store-page') renderShop();
    }

    // ================================================================
    //  CORE GAME LOGIC  (original, unchanged)
    // ================================================================

    function setMode(newMode) {
      mode = newMode;
      document.getElementById('mode-plus').classList.toggle('active', mode==='add');
      document.getElementById('mode-minus').classList.toggle('active', mode==='sub');
      document.getElementById('mode-both').classList.toggle('active', mode==='mix');
      generateQuestion();
    }

    function getHourKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}-${d.getHours()}`; }

    function maybeReleasePending() {
      const now = new Date(), currentKey = getHourKey(now);
      if (pendingHourKey === null) pendingHourKey = currentKey;
      if (currentKey !== pendingHourKey) {
        if (pendingDollarsThisHour > 0) {
          money += pendingDollarsThisHour;
          const t = new Date(now); t.setMinutes(0,0,0);
          recordDeposit(pendingDollarsThisHour, t);
          pendingDollarsThisHour = 0;
        }
        pendingHourKey = currentKey;
      }
    }

    function renderTopBar() {
      maybeReleasePending();
      document.getElementById('money-display').innerText = String(money);
      document.getElementById('pending-display').innerText = String(pendingDollarsThisHour);
      const el = document.getElementById('hearts');
      el.innerHTML = '';
      for (let i = 0; i < HEARTS_PER_DOLLAR; i++) {
        const img = document.createElement("img");
        img.className = i < heartsFilled ? "heart" : "heart unfilled";
        img.src = i < heartsFilled ? "filled_heart.png" : "unfilled_heart.png";
        img.alt = i < heartsFilled ? "u2665" : "u2661";
        el.appendChild(img);
      }
    }

    function randInt(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }

    function generateQuestion() {
      triesThisQuestion = 0; answerDigits = ''; renderAnswerLine();
      const [min,max] = ranges[tierIndex];
      let n1=randInt(min,max), n2=randInt(min,max);
      let op = mode;
      if (mode==='mix') { op = isNextMixAdd?'add':'sub'; isNextMixAdd=!isNextMixAdd; }
      if (op==='sub') {
        if (n1<n2) [n1,n2]=[n2,n1];
        expectedAnswer=n1-n2; equationText=`${n1} \u2212 ${n2} =`;
      } else {
        expectedAnswer=n1+n2; equationText=`${n1} + ${n2} =`;
      }
      document.getElementById('equation-text').innerText = equationText;
      setFeedback('');
    }

    function setFeedback(text,color) {
      const el=document.getElementById('feedback-text');
      el.innerText=text; el.style.color=color||'#111';
    }

    function renderAnswerLine() {
      document.getElementById('answer-text').innerText = answerDigits.length ? answerDigits : ' ';
    }

    function pressDigit(d) {
      if (answerDigits.length>=4) return;
      if (answerDigits==='0') answerDigits='';
      answerDigits+=String(d); renderAnswerLine(); setFeedback('');
    }

    function clearAnswer() { answerDigits=''; renderAnswerLine(); setFeedback(''); }

    function awardHeart() {
      heartsFilled++;
      if (heartsFilled>=HEARTS_PER_DOLLAR) {
        heartsFilled=0; pendingDollarsThisHour+=1;
        setFeedback('Correct! $1 is pending \u23F3','green');
      }
      renderTopBar(); saveGame();
    }

    function levelUpIfNeeded()   { if (rightStreak>=5 && tierIndex<ranges.length-1) { tierIndex++; rightStreak=0; } }
    function levelDownIfNeeded() { if (wrongStreak>=3 && tierIndex>0)               { tierIndex--; wrongStreak=0; } }

    function submitAnswer() {
      if (!answerDigits.trim()) { setFeedback('I don\u2019t see your answer. Is it hiding?','orange'); return; }
      const userAns = parseInt(answerDigits,10);
      if (userAns===expectedAnswer) {
        triesThisQuestion=0; rightStreak++; wrongStreak=0;
        awardHeart();
        if (!document.getElementById('feedback-text').innerText) setFeedback('Correct!','green');
        levelUpIfNeeded(); generateQuestion(); return;
      }
      triesThisQuestion++;
      if (triesThisQuestion<MAX_TRIES) { setFeedback('Oops! Try again \uD83D\uDC9B','red'); return; }
      setFeedback('We\u2019ll come back to this \u2014 you\u2019re close though!','#8a2be2');
      wrongStreak++; rightStreak=0; levelDownIfNeeded(); generateQuestion();
    }

    // ================================================================
    //  BANK  (original, unchanged)
    // ================================================================

    let showAllTransactions = false;

    function toggleTxView() {
      showAllTransactions = !showAllTransactions;
      document.getElementById('tx-toggle').innerText   = showAllTransactions ? 'View Recent' : 'View All';
      document.getElementById('tx-subtitle').innerText = showAllTransactions ? 'Showing all transactions.' : 'Showing 10 most recent.';
      renderBank();
    }

    function recordDeposit(amount, atOverride) {
      const at = atOverride ? new Date(atOverride) : new Date();
      const hk = getHourKey(at);
      let idx=-1;
      for (let i=0;i<transactions.length;i++) {
        if (transactions[i].type==='deposit' && getHourKey(new Date(transactions[i].at))===hk) { idx=i; break; }
      }
      if (idx>=0) {
        const tx=transactions[idx]; tx.amount+=amount; tx.at=at;
        transactions.splice(idx,1); transactions.unshift(tx);
      } else {
        transactions.unshift({type:'deposit',amount,at});
      }
      if (transactions.length>5000) transactions.length=5000;
      saveGame();
      if (document.getElementById('bank-page').classList.contains('active')) renderBank();
    }

    const dollars    = n => `$${Number(n).toFixed(0)}`;
    const formatTime = d => new Date(d).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    const formatDate = d => new Date(d).toLocaleDateString([],{month:'short',day:'numeric'});

    function renderBank() {
      renderTopBar();
      const el = document.getElementById('tx-list');
      el.innerHTML = '';
      if (!transactions.length) {
        const li=document.createElement('li');
        li.style.opacity='0.9'; li.innerText='No transactions yet — earn $1 by filling the hearts!';
        el.appendChild(li); return;
      }
      const max = showAllTransactions ? transactions.length : Math.min(10,transactions.length);
      for (let i=0;i<max;i++) {
        const tx=transactions[i], li=document.createElement('li');
        li.style.color = tx.type==='deposit' ? '#6bff8a' : '#ff6b6b';
        li.textContent = `${tx.type==='deposit'?'+':'-'}${dollars(tx.amount)} — ${tx.type==='deposit'?'Deposit':(tx.note||'Purchase')} — ${formatDate(tx.at)} \u2022 ${formatTime(tx.at)}`;
        el.appendChild(li);
      }
    }

    // ================================================================
    //  SHOP
    // ================================================================

    function renderShop() {
      const listEl = document.getElementById('shop-list');
      listEl.innerHTML = '';
      for (const item of SHOP_ITEMS) {
        const alreadyOwned = !item.unlimited && ownedItems.has(item.id);
        const row = document.createElement('div');
        row.className = 'shop-item';

        // Icon
        const img = document.createElement('img');
        img.className = 'shop-icon'; img.src = item.icon; img.alt = item.name;
        img.onerror = function() { this.style.background='#ff69b4'; this.style.opacity='0.6'; };

        // Info
        const info = document.createElement('div');
        info.className = 'shop-info';
        info.innerHTML = `<div class="shop-name">${item.name}</div><div class="shop-desc">${item.desc}</div>`;

        // Button
        const btn = document.createElement('button');
        btn.className = 'buy-btn';
        btn.disabled = alreadyOwned;
        btn.innerText = alreadyOwned ? 'Owned \u2713' : 'Get';
        btn.onclick = () => buyItem(item.id);

        row.appendChild(img); row.appendChild(info); row.appendChild(btn);
        listEl.appendChild(row);
      }
    }

    function buyItem(itemId) {
      const item = SHOP_ITEMS.find(i => i.id===itemId);
      if (!item) return;
      if (!item.unlimited && ownedItems.has(itemId)) return;
      if (!item.unlimited) ownedItems.add(itemId);
      inventory[itemId] = (inventory[itemId]||0) + 1;
      saveGame();
      renderShop();
    }

    // ================================================================
    //  CLOSET / INVENTORY PANEL
    // ================================================================

    function openCloset() {
      document.getElementById('closet-overlay').style.display = 'block';
      renderClosetInventory();
    }

    function closeCloset() {
      document.getElementById('closet-overlay').style.display = 'none';
    }

    function renderClosetInventory() {
      const panel = document.getElementById('closet-inv-panel');
      panel.innerHTML = '';

      const allIds = Object.keys(inventory).filter(id => (inventory[id]||0) > 0);

      if (!allIds.length) {
        const e=document.createElement('div'); e.className='inv-empty';
        e.innerText='Nothing here! Visit the Shop \u2B06'; panel.appendChild(e); return;
      }

      const wearables   = allIds.filter(id => { const d=getItemDef(id); return d&&d.type==='wearable'; });
      const consumables = allIds.filter(id => { const d=getItemDef(id); return d&&d.type==='consumable'; });
      const blindboxes  = allIds.filter(id => { const d=getItemDef(id); return d&&d.type==='blindbox'; });
      const keychains   = allIds.filter(id => KEYCHAIN_ITEMS.some(k=>k.id===id));

      function section(label, ids, buildTile) {
        if (!ids.length) return;
        const lbl = document.createElement('div');
        lbl.className='closet-section-label'; lbl.innerText=label;
        panel.appendChild(lbl);
        const grid = document.createElement('div');
        grid.className='inv-grid';
        ids.forEach(id => { const t=buildTile(id); if(t) grid.appendChild(t); });
        panel.appendChild(grid);
      }

      // WEARABLES: click to equip/unequip
      section('\uD83D\uDC55 Clothes', wearables, id => {
        const def = getItemDef(id); if (!def) return null;
        const isOn = Object.values(equipped).includes(id);
        const tile = buildTile(def, isOn);
        tile.onclick = () => toggleEquip(id);
        tile.title = isOn ? 'Click to take off' : 'Click to wear';
        return tile;
      });

      // CONSUMABLES: drag onto character
      section('\uD83D\uDC84 Beauty', consumables, id => {
        const def=getItemDef(id); if (!def) return null;
        const cnt=inventory[id]||0;
        const tile=buildTile(def,false,cnt>1?cnt:0);
        tile.draggable=true;
        tile.title='Drag onto the character to apply!';
        tile.addEventListener('dragstart', e => startDragConsumable(e,id));
        tile.addEventListener('dragend',   ()=> endDragConsumable());
        return tile;
      });

      // BLIND BOXES: click to open
      section('\uD83C\uDF81 Boxes', blindboxes, id => {
        const def=getItemDef(id); if (!def) return null;
        const cnt=inventory[id]||0;
        const tile=buildTile(def,false,cnt>1?cnt:0);
        tile.title='Click to open!';
        tile.onclick=()=>openBlindBox();
        return tile;
      });

      // KEYCHAINS: drag into room
      section('\uD83D\uDD11 Keychains', keychains, id => {
        const def=getItemDef(id); if (!def) return null;
        const cnt=inventory[id]||0;
        const tile=buildTile(def,false,cnt>1?cnt:0);
        tile.draggable=true;
        tile.title='Drag into the room to place!';
        tile.addEventListener('dragstart', e=>startDragKeychain(e,id));
        tile.addEventListener('dragend',   ()=>endDragKeychain());
        return tile;
      });
    }

    // Creates a closet tile element
    function buildTile(def, isEquipped, badgeCount) {
      const tile = document.createElement('div');
      tile.className = 'inv-tile' + (isEquipped ? ' equipped' : '');
      tile.dataset.itemId = def.id;

      const img = document.createElement('img');
      img.src = def.icon; img.alt = def.name;
      img.onerror = function() {
        this.style.display='none';
        tile.style.background='#ff69b4';
        tile.style.fontSize='7px'; tile.style.color='#fff'; tile.style.padding='2px';
        tile.innerText=def.name;
      };
      tile.appendChild(img);

      if (badgeCount > 0) {
        const b=document.createElement('div'); b.className='badge'; b.innerText=badgeCount; tile.appendChild(b);
      }
      return tile;
    }

    // ================================================================
    //  EQUIP SYSTEM (wearables)
    // ================================================================

    function toggleEquip(itemId) {
      const item = SHOP_ITEMS.find(i => i.id===itemId);
      if (!item || item.type!=='wearable') return;
      const slot = item.slot;
      const overlay = document.getElementById(`char-${slot}-overlay`);
      if (!overlay) return;

      if (equipped[slot] === itemId) {
        equipped[slot] = null; overlay.src=''; overlay.style.display='none';
      } else {
        equipped[slot] = itemId; overlay.src=item.src; overlay.style.display='';
      }
      saveGame();
      renderClosetInventory();
    }

    function applyEquipped() {
      ['hair','body','legs','eyes','smile'].forEach(slot => {
        const overlay = document.getElementById(`char-${slot}-overlay`);
        if (!overlay) return;
        const id = equipped[slot];
        if (id) {
          const def = getItemDef(id);
          if (def&&def.src) { overlay.src=def.src; overlay.style.display=''; }
        } else { overlay.src=''; overlay.style.display='none'; }
      });
    }

    // ================================================================
    //  CONSUMABLES — drag onto character
    // ================================================================

    let currentDragConsumable = null;

    function startDragConsumable(e, itemId) {
      currentDragConsumable = itemId;
      e.dataTransfer.effectAllowed = 'move';
      document.getElementById('char-drop-zone').classList.add('drag-active');
    }

    function endDragConsumable() {
      currentDragConsumable = null;
      document.getElementById('char-drop-zone').classList.remove('drag-active');
    }

    function applyConsumable(itemId) {
      const item = SHOP_ITEMS.find(i => i.id===itemId);
      if (!item||item.type!=='consumable') return;
      if (!inventory[itemId]||inventory[itemId]<=0) return;
      inventory[itemId]--;
      if (inventory[itemId]<=0) delete inventory[itemId];
      equipped[item.slot] = itemId;
      const overlay = document.getElementById(`char-${item.slot}-overlay`);
      if (overlay) { overlay.src=item.src; overlay.style.display=''; }
      saveGame();
      renderClosetInventory();
    }

    function setupCharDropZone() {
      const zone = document.getElementById('char-drop-zone');
      zone.addEventListener('dragover', e => { if (currentDragConsumable) e.preventDefault(); });
      zone.addEventListener('drop', e => {
        e.preventDefault();
        if (currentDragConsumable) {
          applyConsumable(currentDragConsumable);
          currentDragConsumable=null;
          zone.classList.remove('drag-active');
        }
      });
    }

    // ================================================================
    //  BLIND BOX REVEAL ANIMATION
    // ================================================================

    function openBlindBox() {
      if (!inventory['blind_box']||inventory['blind_box']<=0) return;
      inventory['blind_box']--;
      if (inventory['blind_box']<=0) delete inventory['blind_box'];

      // Pick random keychain
      const prize = KEYCHAIN_ITEMS[Math.floor(Math.random()*KEYCHAIN_ITEMS.length)];

      const reveal   = document.getElementById('blindbox-reveal');
      const animImg  = document.getElementById('blindbox-anim-img');
      const nameEl   = document.getElementById('blindbox-reveal-name');
      const closeBtn = document.getElementById('blindbox-close-btn');

      // Reset
      animImg.src = 'blind_box_icon.png';
      animImg.className = '';
      nameEl.className = ''; nameEl.innerText = '';
      closeBtn.style.display = 'none';
      reveal.classList.add('active');
      reveal.dataset.canClose = 'false';

      // Start wiggle
      setTimeout(() => animImg.classList.add('wiggling'), 80);

      // After 3s: pop open to reveal prize
      setTimeout(() => {
        animImg.classList.remove('wiggling');
        void animImg.offsetWidth; // force reflow to restart animation
        animImg.src = prize.icon;
        animImg.classList.add('popping');
        nameEl.innerText = `You got a ${prize.name}! \uD83C\uDF89`;
        setTimeout(() => nameEl.classList.add('show'), 150);
        closeBtn.style.display = '';
        reveal.dataset.canClose = 'true'; // now safe to click to close

        // Add to inventory & save
        inventory[prize.id] = (inventory[prize.id]||0)+1;
        saveGame();
        renderClosetInventory();
      }, 3000);
    }

    function closeBlindboxReveal() {
      const reveal = document.getElementById('blindbox-reveal');
      if (reveal.dataset.canClose === 'false') return; // still animating
      reveal.classList.remove('active');
    }

    // ================================================================
    //  ROOM ITEMS (keychains — drag from closet, drag to reposition, dblclick to return)
    // ================================================================

    let currentDragKeychain = null;
    let draggingPlacedId    = null;

    function startDragKeychain(e, itemId) {
      currentDragKeychain = itemId;
      e.dataTransfer.effectAllowed = 'copy';
    }

    function endDragKeychain() { currentDragKeychain = null; }

    function setupRoomDrop() {
      const roomStage = document.getElementById('room-stage');

      roomStage.addEventListener('dragover', e => {
        if (currentDragKeychain || draggingPlacedId) {
          e.preventDefault();
          e.dataTransfer.dropEffect = currentDragKeychain ? 'copy' : 'move';
        }
      });

      roomStage.addEventListener('drop', e => {
        e.preventDefault();
        const rect = roomStage.getBoundingClientRect();
        const xPct = (e.clientX - rect.left) / rect.width  * 100;
        const yPct = (e.clientY - rect.top)  / rect.height * 100;

        if (currentDragKeychain) {
          const id = currentDragKeychain;
          if (inventory[id] > 0) {
            // Remove one from closet inventory and place in room
            inventory[id]--;
            if (inventory[id]<=0) delete inventory[id];
            instanceCounter++;
            const ri = { id, instanceId:instanceCounter, xPct, yPct };
            roomItems.push(ri);
            renderPlacedItem(ri);
            saveGame();
            renderClosetInventory();
          }
          currentDragKeychain = null;
        } else if (draggingPlacedId) {
          // Reposition existing placed item
          const ri = roomItems.find(r => r.instanceId===draggingPlacedId);
          if (ri) {
            ri.xPct = xPct; ri.yPct = yPct;
            const el = document.querySelector(`.placed-item[data-instance="${draggingPlacedId}"]`);
            if (el) { el.style.left=xPct+'%'; el.style.top=yPct+'%'; }
            saveGame();
          }
          draggingPlacedId = null;
        }
      });
    }

    function renderPlacedItem(ri) {
      const def = KEYCHAIN_ITEMS.find(k => k.id===ri.id);
      if (!def) return;
      const layer = document.getElementById('items-layer');
      const img = document.createElement('img');
      img.className = 'placed-item';
      img.src       = def.src;
      img.alt       = def.name;
      img.dataset.instance = ri.instanceId;
      img.style.left = ri.xPct + '%';
      img.style.top  = ri.yPct + '%';
      img.title = `${def.name} — double-click to return to closet`;
      img.draggable = true;
      img.onerror = function() { this.style.background='#ffb3de'; this.style.borderRadius='4px'; };

      img.addEventListener('dragstart', e => {
        e.stopPropagation();
        draggingPlacedId = ri.instanceId;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(ri.instanceId));
      });
      img.addEventListener('dragend', () => { /* draggingPlacedId cleared in drop handler */ });

      // Double-click returns to closet inventory
      img.addEventListener('dblclick', () => {
        inventory[ri.id] = (inventory[ri.id]||0)+1;
        roomItems = roomItems.filter(r => r.instanceId!==ri.instanceId);
        img.remove();
        saveGame();
        renderClosetInventory();
      });

      layer.appendChild(img);
    }

    function applyRoomItems() {
      document.querySelectorAll('.placed-item').forEach(el => el.remove());
      roomItems.forEach(ri => renderPlacedItem(ri));
    }

    // ================================================================
    //  ROOM SETUP
    // ================================================================

    function setupRoom() {
      const hitbox  = document.getElementById('closet-hitbox');
      const overlay = document.getElementById('closet-overlay');
      if (!hitbox||!overlay) return;

      hitbox.addEventListener('click', openCloset);

      // Clicking the background (not panel or close btn) closes closet
      overlay.addEventListener('click', e => {
        if (!e.target.closest('#closet-inv-panel') && !e.target.closest('#closet-close-btn')) {
          closeCloset();
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key==='Escape') { closeCloset(); closeBlindboxReveal(); }
      });

      setupCharDropZone();
      setupRoomDrop();
    }

    // ================================================================
    //  INIT
    // ================================================================

    loadGame();
    setupRoom();
    if (!pendingHourKey) pendingHourKey = getHourKey(new Date());
    renderTopBar();
    setMode(mode);
    applyEquipped();
    applyRoomItems();
    // Shop rendered lazily when page opens

  </script>
</body>
</html>
