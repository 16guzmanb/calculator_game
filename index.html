<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arithmatic Lifestyle Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #2b2b2b;
      --frame-bg: #111;
      --overlay-bg: rgba(0,0,0,0.85);
      --btn-black: #111;
      --btn-white: #fff;
    }

    body {
      margin: 0;
      font-family: 'Bubblegum Sans', cursive;
      background: var(--page-bg);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 18px;
    }

    h1, h2, h3, button, input, select, label, p, div {
      font-family: 'Bubblegum Sans', cursive;
    }

    /* ====== GAME FRAME ====== */
    .game-frame {
      width: min(900px, 100%);
      aspect-ratio: 170 / 107;
      background: var(--frame-bg);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 12px 50px rgba(0,0,0,0.45);
    }

    .topbar {
      position: absolute;
      left: 0; right: 0; top: 0;
      z-index: 50;
      height: 48px;
      background: var(--overlay-bg);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      box-sizing: border-box;
      gap: 12px;
    }

    .hearts { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; line-height: 1; user-select: none; }
    .heart  { width: 22px; height: 22px; object-fit: contain; image-rendering: pixelated; }
    .heart.unfilled { filter: invert(1); }
    .bank   { font-weight: 700; white-space: nowrap; text-align: right; }
    .tiny   { font-size: 12px; opacity: 0.85; }

    .layout   { position: absolute; inset: 0; }

    .side-nav {
      position: absolute;
      left: 14px; top: 64px;
      width: 130px;
      z-index: 60;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-btn {
      border: 0; border-radius: 12px;
      padding: 10px 10px;
      cursor: pointer; font-size: 16px;
      background: #f2f2f2; color: #111;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    }
    .nav-btn.active { outline: 3px solid rgba(255,105,180,0.6); }

    .main { position: absolute; inset: 0; overflow: hidden; }
    .page { position: absolute; inset: 0; display: none; padding: 12px; }
    .page.active { display: block; }

    /* ====== CALCULATOR ====== */
    .calculator-stage { position: absolute; inset: 0; display: grid; place-items: center; padding: 0; }
    .calc { position: relative; height: 100%; width: auto; aspect-ratio: 170/107; }
    .calc img:not(#clock-face):not(#clock-hour):not(#clock-min) {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; image-rendering: pixelated;
      user-select: none; -webkit-user-drag: none;
    }
    .calc-display {
      position: absolute;
      left: 34%; bottom: 52%; top: auto; width: 54%; height: 18%;
      z-index: 7; color: #111;
      display: flex; flex-direction: column; justify-content: center;
      gap: 4px; padding: 6px 10px; box-sizing: border-box;
    }
    .equation   { font-size: 36px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .answerline { font-size: 20px; font-weight: 700; line-height: 1.1; }
    .feedback   { font-size: 14px; min-height: 18px; }
    .calc-anim-layer {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; image-rendering: pixelated;
      user-select: none; -webkit-user-drag: none;
      z-index: 2; pointer-events: none;
    }
    .keypad {
      position: absolute;
      left: 34%; bottom: 6%; top: auto; width: 54%; height: 44%;
      z-index: 6;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 0.9fr;
      grid-template-rows: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }
    .key { border: 0; border-radius: 14px; cursor: pointer; font-size: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.25); }
    .key.num    { background: var(--btn-black); color: #fff; }
    .key.action { background: var(--btn-black); color: #fff; font-size: 18px; }
    .key.mode   { background: var(--btn-white); color: #111; font-weight: 800; }
    .key.mode.active { outline: 4px solid rgba(0,0,0,0.35); }
    .kOK { background: var(--btn-white) !important; color: #111 !important; font-weight: 800; }
    .k1{grid-column:1;grid-row:1} .k2{grid-column:2;grid-row:1} .k3{grid-column:3;grid-row:1}
    .k4{grid-column:1;grid-row:2} .k5{grid-column:2;grid-row:2} .k6{grid-column:3;grid-row:2}
    .k7{grid-column:1;grid-row:3} .k8{grid-column:2;grid-row:3} .k9{grid-column:3;grid-row:3}
    .k0{grid-column:2;grid-row:4}
    .kPlus{grid-column:4;grid-row:1} .kMinus{grid-column:4;grid-row:2} .kBoth{grid-column:4;grid-row:3}
    .kClear{grid-column:1;grid-row:4} .kOK{grid-column:3;grid-row:4} .kABC{grid-column:4;grid-row:4} .kClock{grid-column:5;grid-row:4}
    .equation.abc-word { font-size: 22px; letter-spacing: 3px; }

    /* ====== CLOCK WIDGET ====== */
    #clock-widget {
      position: absolute;
      left: 38%; top: 2%;
      width: 34%; aspect-ratio: 1;
      z-index: 8; display: none;
    }
    #clock-widget img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain; image-rendering: pixelated;
      user-select: none; -webkit-user-drag: none;
    }
    #clock-hour, #clock-min {
      transform-origin: 50% 50%;
    }

    /* ====== BANK ====== */
    .bank-panel {
      width: min(500px, 90%);
      margin: 40px auto;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 14px;
      color: #fff;
    }
    #room-page .bank-panel { width: min(760px, 100%); margin: 40px auto; }
    .bank-panel h2 { margin: 0 0 8px; }
    .tx-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; }
    .tx-btn  { border: 0; border-radius: 12px; padding: 8px 10px; cursor: pointer; background: #f2f2f2; color: #111; }
    #tx-list { margin-top: 10px; padding: 0; list-style: none; }
    #tx-list li { margin: 8px 0; font-weight: 800; }

    /* ====== STORE ====== */
    .store-panel {
      width: min(480px, 90%);
      margin: 52px auto 0;
      height: calc(100% - 72px);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 12px;
      color: #fff;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .store-panel h2 { margin: 0 0 8px; flex-shrink: 0; }
    .shop-scroll {
      flex: 1; overflow-y: auto; padding: 2px 2px 4px;
    }
    .shop-scroll::-webkit-scrollbar { width: 5px; }
    .shop-scroll::-webkit-scrollbar-thumb { background: rgba(255,105,180,0.45); border-radius: 3px; }
    .shop-item {
      display: flex; align-items: center; gap: 9px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px; padding: 7px 9px; margin-bottom: 6px;
    }
    .shop-icon {
      width: 38px; height: 38px;
      object-fit: contain; image-rendering: pixelated;
      border-radius: 6px; background: rgba(255,255,255,0.12); flex-shrink: 0;
    }
    .shop-info { flex: 1; min-width: 0; }
    .shop-name { font-size: 13px; }
    .shop-desc { font-size: 10px; opacity: 0.6; margin-top: 1px; }
    .buy-btn {
      flex-shrink: 0; border: 0; border-radius: 9px; padding: 5px 12px;
      cursor: pointer; background: #ff69b4; color: #fff;
      font-family: 'Bubblegum Sans', cursive; font-size: 13px; white-space: nowrap;
    }
    .buy-btn:disabled {
      background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.5); cursor: default;
    }

    /* ====== ROOM STAGE ====== */
    .room-stage {
      position: relative;
      width: min(680px, 100%);
      aspect-ratio: 170 / 107;
      border-radius: 16px; overflow: hidden;
      margin: 0 auto;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.05);
      image-rendering: pixelated;
    }

    #character-layer {
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
    }
    #character-layer .char-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; object-position: right bottom;
      image-rendering: pixelated; user-select: none; -webkit-user-drag: none;
    }
    /* Base stacking */
    #character-layer .char-hair  { z-index: 10; }
    #character-layer .char-body  { z-index: 20; }
    #character-layer .char-eyes  { z-index: 30; }
    #character-layer .char-smile { z-index: 40; }
    /* Equipped overlays */
    #char-hair-overlay  { z-index: 11; }
    #char-tank-overlay  { z-index: 21; }
    #char-body-overlay  { z-index: 22; }
    #char-legs-overlay  { z-index: 23; }
    #char-shoes-overlay { z-index: 24; }
    #char-eyes-overlay  { z-index: 31; }
    #char-smile-overlay { z-index: 41; }

    .room-stage img:not(.placed-item) {
      position: absolute; right: 0; bottom: 0; left: auto; top: auto;
      width: 100%; height: auto; object-fit: contain;
      image-rendering: pixelated; user-select: none; -webkit-user-drag: none;
    }
    #room-bg           { z-index: 1; }
    .character-layer   { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
    .items-layer       { position: absolute; inset: 0; z-index: 45; pointer-events: none; }
    .closet-hitbox     {
      position: absolute; z-index: 50;
      left: 0%; top: 10%; width: 22%; height: 78%;
      background: transparent; border: none; cursor: pointer;
    }

    /* Character drop zone for consumable drag */
    #char-drop-zone {
      position: absolute; right: 2%; top: 5%; width: 70%; height: 90%;
      z-index: 6; pointer-events: none;
      border-radius: 10px; box-sizing: border-box;
      border: 2px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    #char-drop-zone.drag-active {
      pointer-events: all;
      background: rgba(255,105,180,0.12);
      border-color: rgba(255,105,180,0.75);
      border-style: dashed;
    }

    /* ====== CLOSET OVERLAY ====== */
    #closet-overlay {
      position: absolute; inset: 0; z-index: 55; display: none;
    }
    .closet-bg-img {
      position: absolute; left: 0; bottom: 0; width: 100%; height: 100%;
      object-fit: contain; object-position: left bottom;
      image-rendering: pixelated; pointer-events: none;
      user-select: none; -webkit-user-drag: none;
    }
    #closet-close-btn {
      position: absolute; top: 5px; left: calc(23% + 6px);
      z-index: 57; background: rgba(0,0,0,0.6); color: #fff;
      border: 0; border-radius: 50%;
      width: 20px; height: 20px; cursor: pointer;
      font-size: 12px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    #closet-inv-panel {
      position: absolute; left: 1.5%; top: 6%; width: 22%; height: 82%;
      overflow-y: auto; z-index: 56;
      padding: 4px 3px; box-sizing: border-box;
      display: flex; flex-direction: column; gap: 3px;
    }
    #closet-inv-panel::-webkit-scrollbar { width: 3px; }
    #closet-inv-panel::-webkit-scrollbar-thumb { background: rgba(255,105,180,0.5); border-radius: 2px; }
    .closet-section-label {
      color: #fff; font-size: 9px; opacity: 0.8;
      text-align: center; letter-spacing: 0.4px; margin: 3px 0 1px;
    }
    .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .inv-tile {
      position: relative; background: rgba(255,255,255,0.20);
      border-radius: 6px; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid transparent; overflow: hidden;
      transition: filter 0.15s, border-color 0.15s;
    }
    .inv-tile:hover { border-color: rgba(255,105,180,0.7); }
    .inv-tile img {
      max-width: 90%; max-height: 90%; width: auto; height: auto;
      object-fit: contain; image-rendering: pixelated; pointer-events: none;
    }
    /* Darkened = equipped/applied */
    .inv-tile.equipped { filter: brightness(0.42); border-color: #ff69b4 !important; }
    .inv-tile.equipped::after {
      content: '✓'; position: absolute; top: 1px; right: 3px;
      font-size: 9px; color: #ff69b4; filter: brightness(2.5);
    }
    .badge {
      position: absolute; bottom: 1px; right: 1px;
      background: #ff69b4; color: #fff; border-radius: 50%;
      width: 13px; height: 13px; font-size: 8px;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .inv-tile[draggable="true"] { cursor: grab; }
    .inv-tile[draggable="true"]:active { cursor: grabbing; }
    .inv-empty { color: rgba(255,255,255,0.45); font-size: 10px; text-align: center; padding: 8px 4px; }

    /* ====== MINI CALC ROOM OVERLAY ====== */
    #room-calc-overlay {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      user-select: none;
      -webkit-user-drag: none;
      z-index: 4;
      pointer-events: none;
      transition: transform 0.2s ease;
    }
    #room-calc-hotspot {
      position: absolute;
      left: 91%;
      top: 46%;
      width: 8%;
      height: 10%;
      z-index: 50;
      cursor: pointer;
      background: transparent;
      border: none;
    }
    .room-calc-wrap:hover #room-calc-overlay {
      transform: scale(1.22);
      transform-origin: 95% 51%;
    }
    .room-calc-wrap {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .room-calc-wrap #room-calc-hotspot { pointer-events: all; }

    /* ====== PLACED ROOM ITEMS ====== */
    .placed-item {
      position: absolute; width: 9%;
      cursor: grab; image-rendering: pixelated; z-index: 45;
      user-select: none; transition: filter 0.15s; pointer-events: all;
    }
    .placed-item:hover { filter: drop-shadow(0 0 4px #ff69b4); }
    .placed-item.poster-size { width: 22%; }
    .placed-item.glow-lamp { filter: drop-shadow(0 0 8px #ff69b4) drop-shadow(0 0 16px rgba(255,105,180,0.4)); }
    .placed-item.glow-lamp:hover { filter: drop-shadow(0 0 12px #ff69b4) drop-shadow(0 0 22px rgba(255,105,180,0.5)); }

    /* ====== TOUCH DRAG GHOST ====== */
    #touch-drag-ghost {
      position: fixed;
      z-index: 10000;
      pointer-events: none;
      opacity: 0.75;
      display: none;
      width: 40px; height: 40px;
      object-fit: contain;
      image-rendering: pixelated;
      transform: translate(-50%, -50%);
    }

    /* ====== BLIND BOX REVEAL ====== */
    #blindbox-reveal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.88);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #blindbox-reveal.active { display: flex; }
    #blindbox-anim-img { width: 110px; height: 110px; object-fit: contain; image-rendering: pixelated; }
    @keyframes wiggle {
      0%  { transform: rotate(-10deg) scale(1.00); }
      20% { transform: rotate(10deg)  scale(1.12); }
      40% { transform: rotate(-8deg)  scale(1.06); }
      60% { transform: rotate(8deg)   scale(1.10); }
      80% { transform: rotate(-6deg)  scale(1.04); }
      100%{ transform: rotate(0deg)   scale(1.00); }
    }
    @keyframes popIn {
      0%  { transform: scale(0.2) rotate(-15deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(5deg);   opacity: 1; }
      100%{ transform: scale(1.0) rotate(0);      opacity: 1; }
    }
    #blindbox-anim-img.wiggling { animation: wiggle 0.4s ease-in-out infinite; }
    #blindbox-anim-img.popping  { animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
    #blindbox-reveal-name {
      color: #fff; font-size: 24px; opacity: 0; transition: opacity 0.4s;
    }
    #blindbox-reveal-name.show { opacity: 1; }
    #blindbox-close-btn {
      display: none; border: 0; border-radius: 20px;
      padding: 10px 28px; background: #ff69b4; color: #fff;
      font-family: 'Bubblegum Sans', cursive; font-size: 16px; cursor: pointer;
    }

    /* ====== HEART CONFETTI ====== */
    .confetti-heart {
      position: fixed;
      font-size: 24px;
      z-index: 9999;
      pointer-events: none;
      animation: confettiFall 2s ease-out forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      50%  { opacity: 1; transform: translateY(40vh) rotate(180deg) scale(0.9); }
      100% { opacity: 0; transform: translateY(85vh) rotate(360deg) scale(0.5); }
    }
  </style>
</head>
<body>

  <!-- Blind box reveal (fixed, on top of everything) -->
  <div id="blindbox-reveal" onclick="closeBlindboxReveal()">
    <img id="blindbox-anim-img" src="blind_box_icon.png" alt="Blind Box" />
    <div id="blindbox-reveal-name"></div>
    <button id="blindbox-close-btn" onclick="closeBlindboxReveal()">Yay! &#x1F389;</button>
  </div>

  <img id="touch-drag-ghost" src="" alt="" />

  <div class="game-frame">

    <div class="topbar">
      <div>
        <div class="hearts" id="hearts"></div>
        <div class="tiny" id="hearts-hint">Get 3 hearts &#x2192; +$1</div>
      </div>
      <div class="bank">
        <div>Available: $<span id="money-display">0</span></div>
      </div>
    </div>

    <div class="layout">
      <div class="side-nav">
        <button class="nav-btn active" id="nav-calc"  onclick="showPage('game-page')">Calculator</button>
        <button class="nav-btn"        id="nav-bank"  onclick="showPage('bank-page')">Bank</button>
        <button class="nav-btn"        id="nav-store" onclick="showPage('store-page')">Shop</button>
        <button class="nav-btn"        id="nav-room"  onclick="showPage('room-page')">Room</button>
      </div>

      <div class="main">

        <!-- CALCULATOR -->
        <div id="game-page" class="page active">
          <div class="calculator-stage">
            <div class="calc" aria-label="Calculator">
              <img id="calc-bg" src="math_bg.png" alt="Calculator UI" />
              <!-- Character eye + animation layer (same 170x107 size, edge-to-edge) -->
              <img id="calc-eye-static" src="calc_eyes.png" alt="" class="calc-anim-layer" />
              <img id="calc-eye-anim" class="calc-anim-layer" style="display:none;" />
              <div class="calc-display" aria-live="polite">
                <div class="equation" id="equation-text">&#x2026;</div>
                <div class="answerline" id="answer-text"> </div>
                <div class="feedback"  id="feedback-text"></div>
              </div>

              <!-- Clock widget (shown in clock mode) -->
              <div id="clock-widget">
                <img src="clock_face.png" id="clock-face" alt="clock" />
                <img src="hour_hand.png"  id="clock-hour" alt="" />
                <img src="min_hand.png"   id="clock-min"  alt="" />
              </div>
              <div class="keypad" aria-label="Keypad" style="grid-template-columns:1fr 1fr 1fr 0.9fr 0.9fr;">
                <button class="key num k1" id="key-1" onclick="handleKeyPress(1)">1</button>
                <button class="key num k2" id="key-2" onclick="handleKeyPress(2)">2</button>
                <button class="key num k3" id="key-3" onclick="handleKeyPress(3)">3</button>
                <button class="key num k4" id="key-4" onclick="handleKeyPress(4)">4</button>
                <button class="key num k5" id="key-5" onclick="handleKeyPress(5)">5</button>
                <button class="key num k6" id="key-6" onclick="handleKeyPress(6)">6</button>
                <button class="key num k7" id="key-7" onclick="handleKeyPress(7)">7</button>
                <button class="key num k8" id="key-8" onclick="handleKeyPress(8)">8</button>
                <button class="key num k9" id="key-9" onclick="handleKeyPress(9)">9</button>
                <button class="key action kClear" onclick="clearAnswer()">Clear</button>
                <button class="key num k0" id="key-0" onclick="pressDigit(0)">0</button>
                <button class="key mode kABC"   id="mode-abc"   onclick="setMode('abc')">ABC</button>
                <button class="key action kOK"  onclick="submitAnswer()">ok!</button>
                <button class="key mode kPlus"  id="mode-plus"  onclick="setMode('add')">+</button>
                <button class="key mode kMinus" id="mode-minus" onclick="setMode('sub')">&minus;</button>
                <button class="key mode kBoth"  id="mode-both"  onclick="setMode('mix')">Both</button>
                <button class="key mode kClock" id="mode-clock" onclick="setMode('clock')">&#x1F551;</button>
              </div>
            </div>
          </div>
        </div>

        <!-- BANK -->
        <div id="bank-page" class="page">
          <div class="bank-panel">
            <h2>The Bank</h2>
            <div class="tiny">(Progress saves automatically!)</div>
            <div class="tx-head">
              <h3 style="margin:0;">Transactions</h3>
              <button class="tx-btn" id="tx-toggle" onclick="toggleTxView()">View All</button>
            </div>
            <div class="tiny" id="tx-subtitle">Showing 10 most recent.</div>
            <ul id="tx-list"></ul>
          </div>
        </div>

        <!-- STORE -->
        <div id="store-page" class="page">
          <div class="store-panel">
            <h2>The Shop &#x2728;</h2>
            <div id="shop-list" class="shop-scroll"></div>
          </div>
        </div>

        <!-- ROOM -->
        <div id="room-page" class="page" style="padding:0;">
            <div class="room-stage" id="room-stage" style="width:100%;height:100%;aspect-ratio:unset;border-radius:0;border:none;margin:0;">

    // ================================================================

    const SAVE_KEY = 'alg_save_v1';

    function saveGame() {
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          money, heartsFilled,
          transactions, tierIndex, rightStreak, wrongStreak, mode,
          inventory, ownedItems:[...ownedItems], equipped, roomItems, instanceCounter,
          activePaint, abcTierIndex, abcRightStreak, abcWrongStreak
        }));
      } catch(e) {}
    }

    function loadGame() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const d = JSON.parse(raw);
        money        = d.money ?? 0;
        heartsFilled = d.heartsFilled ?? 0;
        transactions = (d.transactions ?? []).map(tx => ({...tx, at: new Date(tx.at)}));
        tierIndex    = d.tierIndex ?? 0;
        rightStreak  = d.rightStreak ?? 0;
        wrongStreak  = d.wrongStreak ?? 0;
        mode         = d.mode ?? 'add';
        inventory    = d.inventory ?? {};
        ownedItems   = new Set(d.ownedItems ?? []);
        equipped     = { hair:null, body:null, tank:null, legs:null, shoes:null, eyes:null, smile:null, ...(d.equipped ?? {}) };
        roomItems    = d.roomItems ?? [];
        instanceCounter = d.instanceCounter ?? 0;
        activePaint  = d.activePaint ?? null;
        abcTierIndex    = d.abcTierIndex ?? 0;
        abcRightStreak  = d.abcRightStreak ?? 0;
        abcWrongStreak  = d.abcWrongStreak ?? 0;
        // Backfill: any keychain already in inventory counts as owned
        KEYCHAIN_ITEMS.forEach(k => { if (inventory[k.id]) ownedItems.add(k.id); });
      } catch(e) {}
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      Object.values(navMap).forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById(navMap[pageId]).classList.add('active');
      const inRoom = pageId === 'room-page';
      document.querySelector('.side-nav').style.display = inRoom ? 'none' : '';
      document.querySelector('.topbar').style.display   = inRoom ? 'none' : '';
      if (pageId === 'game-page') { startCalcAnimTimers(); } else { stopCalcAnimTimers(); }
      renderTopBar();
      if (pageId === 'bank-page')  renderBank();
      if (pageId === 'store-page') renderShop();
    }

    function setMode(newMode) {
      mode = newMode;
      document.getElementById('mode-plus').classList.toggle('active', mode==='add');
      document.getElementById('mode-minus').classList.toggle('active', mode==='sub');
      document.getElementById('mode-both').classList.toggle('active', mode==='mix');
      if (mode === 'mix') mixStep = 0;
      document.getElementById('mode-abc').classList.toggle('active', mode==='abc');
      document.getElementById('mode-clock').classList.toggle('active', mode==='clock');
      // Swap calculator background
      const calcBg = document.getElementById('calc-bg');
      if (mode === 'clock') {
        if (calcBg) { calcBg.style.display = 'none'; }
        document.querySelector('.calc').style.background = '#000';
        // Hide face elements
        ['calc-eye-static','calc-eye-anim'].forEach(id => {
          const el = document.getElementById(id); if (el) el.style.display = 'none';
        });
        stopCalcAnimTimers();
      } else {
        if (calcBg) { calcBg.style.display = ''; calcBg.src = mode === 'abc' ? 'wordy_bg.png' : 'math_bg.png'; }
        document.querySelector('.calc').style.background = '';
        // Restore face elements
        document.getElementById('calc-eye-static').style.display = '';
        startCalcAnimTimers();
      }
      // Show/hide clock widget vs normal display
      const clockWidget = document.getElementById('clock-widget');
      const calcDisplay = document.querySelector('.calc-display');
      if (mode === 'clock') {
        if (clockWidget) clockWidget.style.display = '';
        if (calcDisplay) calcDisplay.style.display = 'none';
        generateClockQuestion();
      } else {
        if (clockWidget) clockWidget.style.display = 'none';
        if (calcDisplay) calcDisplay.style.display = '';
        if (mode === 'abc') {
          generateWordQuestion();
        } else {
          generateQuestion();
          renderKeypad();
        }
      }
    }

    function renderTopBar() {
      document.getElementById('money-display').innerText = String(money);
      const el = document.getElementById('hearts');
      el.innerHTML = '';
      for (let i = 0; i < HEARTS_PER_DOLLAR; i++) {
        const img = document.createElement("img");
        img.className = i < heartsFilled ? "heart" : "heart unfilled";
        img.src = i < heartsFilled ? "filled_heart.png" : "unfilled_heart.png";
        img.alt = i < heartsFilled ? "\u2665" : "\u2661";
        el.appendChild(img);
      }
    }

    function randInt(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }

    function generateQuestion() {
      // In mix mode, follow the pattern: +, word, -, word, repeat
      if (mode === 'mix') {
        const step = mixStep % 4;
        mixStep++;
        if (step === 1 || step === 3) {
          mixShowingWord = true;
          const calcDisplay = document.querySelector('.calc-display');
          if (calcDisplay) calcDisplay.style.display = '';
          generateWordQuestion();
          return;
        }
        mixShowingWord = false;
        renderKeypad();
      }

      triesThisQuestion = 0; answerDigits = ''; renderAnswerLine();
      const [min1,max1,min2,max2] = ranges[tierIndex];
      let n1=randInt(min1,max1), n2=randInt(min2,max2);
      if (Math.random() < 0.5) [n1,n2] = [n2,n1];
      // For mix: step 0 = add, step 2 = sub (mixStep already incremented so subtract 1)
      let op = mode === 'mix' ? (((mixStep - 1) % 4 === 0) ? 'add' : 'sub') : mode;
      if (op==='sub') {
        if (n1<n2) [n1,n2]=[n2,n1];
        expectedAnswer=n1-n2; equationText=`${n1} \u2212 ${n2} =`;
      } else {
        expectedAnswer=n1+n2; equationText=`${n1} + ${n2} =`;
      }
      document.getElementById('equation-text').innerText = equationText;
      setFeedback('');
    }

    function setFeedback(text,color) {
      const el=document.getElementById('feedback-text');
      el.innerText=text; el.style.color=color||'#111';
    }

    function renderAnswerLine() {
      document.getElementById('answer-text').innerText = answerDigits.length ? answerDigits : ' ';
    }

    function pressDigit(d) {
      if (answerDigits.length>=4) return;
      if (answerDigits==='0') answerDigits='';
      answerDigits+=String(d); renderAnswerLine(); setFeedback('');
    }

    function clearAnswer() {
      if (mode === 'abc') {
        abcFilled = [null, null];
        renderWordDisplay();
        setFeedback('');
        return;
      }
      if (mode === 'clock') { generateClockQuestion(); return; }
      answerDigits=''; renderAnswerLine(); setFeedback('');
    }

    function handleKeyPress(index) {
      if (mode === 'abc' || mixShowingWord) {
        pressLetter(abcLetters[index - 1]);
      } else if (mode === 'clock') {
        if (index >= 1 && index <= 4) selectClockAnswer(clockOptions[index - 1]);
      } else {
        pressDigit(index);
      }
    }

    function renderKeypad() {
      const isAbc   = mode === 'abc' || mixShowingWord;
      const isClock = mode === 'clock';
      for (let i = 1; i <= 9; i++) {
        const btn = document.getElementById(`key-${i}`);
        if (!btn) continue;
        if (isClock) {
          if (i <= 4) {
            btn.innerText = clockOptions[i - 1] || '';
            btn.className = `key mode k${i}`;
            btn.style.visibility = '';
            btn.style.fontSize = '14px';
          } else {
            btn.style.visibility = 'hidden';
          }
        } else {
          btn.style.visibility = '';
          btn.style.fontSize = '';
          btn.innerText = isAbc ? (abcLetters[i - 1] || '') : String(i);
          btn.className = `key ${isAbc ? 'mode' : 'num'} k${i}`;
        }
      }
      const k0 = document.getElementById('key-0');
      if (k0) k0.style.visibility = (isAbc || isClock) ? 'hidden' : '';
    }

    // ================================================================
    //  ABC MODE
    // ================================================================

    function generateWordQuestion() {
      abcFilled = [null, null];
      abcTriesThisWord = 0;
      const tier = WORD_TIERS[Math.min(abcTierIndex, WORD_TIERS.length - 1)];
      const entry = tier[Math.floor(Math.random() * tier.length)];
      abcWord = entry.w.toUpperCase();
      abcHint = entry.hint;

      // Pick 2 random blank positions
      const indices = Array.from({length: abcWord.length}, (_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      abcBlanks = indices.slice(0, 2).sort((a, b) => a - b);

      // 2 correct letters + 7 random wrong ones
      const correct = [abcWord[abcBlanks[0]], abcWord[abcBlanks[1]]];
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const used = new Set(correct);
      const wrong = [];
      while (wrong.length < 7) {
        const l = alphabet[Math.floor(Math.random() * 26)];
        if (!used.has(l)) { used.add(l); wrong.push(l); }
      }
      abcLetters = [...correct, ...wrong];
      for (let i = abcLetters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [abcLetters[i], abcLetters[j]] = [abcLetters[j], abcLetters[i]];
      }

      renderWordDisplay();
      renderKeypad();
      setFeedback(abcHint, '#8a2be2');
    }

    function renderWordDisplay() {
      let display = '';
      for (let i = 0; i < abcWord.length; i++) {
        if (i === abcBlanks[0])      display += (abcFilled[0] !== null ? abcFilled[0] : '_');
        else if (i === abcBlanks[1]) display += (abcFilled[1] !== null ? abcFilled[1] : '_');
        else                         display += abcWord[i];
        if (i < abcWord.length - 1) display += ' ';
      }
      const eqEl = document.getElementById('equation-text');
      eqEl.innerText = display;
      eqEl.className = abcWord.length >= 6 ? 'equation abc-word' : 'equation';

      const ans = document.getElementById('answer-text');
      const b1 = abcFilled[0] !== null ? abcFilled[0] : '_';
      const b2 = abcFilled[1] !== null ? abcFilled[1] : '_';
      ans.innerText = `${b1}  ${b2}`;
    }

    function pressLetter(letter) {
      if (!letter) return;
      if (abcFilled[0] === null) {
        abcFilled[0] = letter;
        renderWordDisplay();
        setFeedback('');
      } else if (abcFilled[1] === null) {
        abcFilled[1] = letter;
        renderWordDisplay();
        setTimeout(() => submitWordAnswer(), 350);
      }
    }

    function submitWordAnswer() {
      const c0 = abcWord[abcBlanks[0]];
      const c1 = abcWord[abcBlanks[1]];
      if (abcFilled[0] === c0 && abcFilled[1] === c1) {
        abcTriesThisWord = 0; abcRightStreak++; abcWrongStreak = 0;
        awardHeart();
        if (!document.getElementById('feedback-text').innerText) setFeedback('Correct!', 'green');
        if (abcRightStreak >= 8 && abcTierIndex < WORD_TIERS.length - 1) { abcTierIndex++; abcRightStreak = 0; }
        if (mode === 'mix') { generateQuestion(); } else { generateWordQuestion(); }
      } else {
        abcTriesThisWord++;
        if (abcTriesThisWord < MAX_TRIES) {
          setFeedback('Hmm, try again! \uD83E\uDEE0', 'green');
          abcFilled = [null, null];
          renderWordDisplay();
          setTimeout(() => setFeedback(abcHint, '#8a2be2'), 1200);
        } else {
          setFeedback('So close! \uD83D\uDC9C', '#8a2be2');
          abcTriesThisWord = 0; abcWrongStreak++; abcRightStreak = 0;
          if (abcWrongStreak >= 3 && abcTierIndex > 0) { abcTierIndex--; abcWrongStreak = 0; }
          if (mode === 'mix') { generateQuestion(); } else { generateWordQuestion(); }
        }
      }
    }

    // ================================================================
    //  CLOCK MODE
    // ================================================================

    function fmtTime(h, m) {
      return `${h}:${String(m).padStart(2,'0')}`;
    }

    function generateClockQuestion() {
      const hour    = Math.floor(Math.random() * 12) + 1;
      const minutes = [0, 15, 30, 45][Math.floor(Math.random() * 4)];
      clockCorrect  = fmtTime(hour, minutes);

      // Rotate hands — both images saved pointing straight up (north)
      // Minute hand: 6 degrees per minute
      const minDeg  = minutes * 6;
      // Hour hand: 30 degrees per hour + 0.5 per minute
      const hourDeg = ((hour % 12) * 30) + (minutes * 0.5);

      const hourEl = document.getElementById('clock-hour');
      const minEl  = document.getElementById('clock-min');
      if (hourEl) hourEl.style.transform = `rotate(${hourDeg}deg)`;
      if (minEl)  minEl.style.transform  = `rotate(${minDeg}deg)`;

      // Build 3 wrong answers (unique, different from correct)
      const wrongs = new Set();
      while (wrongs.size < 3) {
        const wh = Math.floor(Math.random() * 12) + 1;
        const wm = [0, 15, 30, 45][Math.floor(Math.random() * 4)];
        const wt = fmtTime(wh, wm);
        if (wt !== clockCorrect) wrongs.add(wt);
      }

      clockOptions = [clockCorrect, ...[...wrongs]];
      // Shuffle
      for (let i = clockOptions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clockOptions[i], clockOptions[j]] = [clockOptions[j], clockOptions[i]];
      }

      renderKeypad();
      setFeedback('What time is it? \uD83D\uDD50', '#8a2be2');
    }

    function selectClockAnswer(chosen) {
      if (!chosen) return;
      if (chosen === clockCorrect) {
        awardHeart();
        setFeedback('Correct! \u2B50', 'green');
        setTimeout(() => generateClockQuestion(), 900);
      } else {
        setFeedback(`Not quite! The time is ${clockCorrect} \uD83D\uDD54`, '#8a2be2');
        setTimeout(() => generateClockQuestion(), 1800);
      }
    }

    function burstHeartConfetti() {
      const hearts = ['\uD83E\uDD0D', '\uD83D\uDC97', '\uD83D\uDDA4'];
      const count = 30;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-heart';
        el.innerText = hearts[i % hearts.length];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = -(Math.random() * 20 + 10) + 'px';
        el.style.fontSize = (18 + Math.random() * 18) + 'px';
        el.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }
    }

    function awardHeart() {
      heartsFilled++;
      if (heartsFilled >= HEARTS_PER_DOLLAR) {
        heartsFilled = 0;
        money += 1;
        // Record each dollar earned as its own deposit transaction
        transactions.unshift({ type:'deposit', amount:1, at:new Date() });
        if (transactions.length > 5000) transactions.length = 5000;
        setFeedback('Correct! +$1 \uD83D\uDCB5', 'green');
        burstHeartConfetti();
      }
      renderTopBar();
      saveGame();
    }

    function levelUpIfNeeded()   { if (rightStreak>=10 && tierIndex<ranges.length-1) { tierIndex++; rightStreak=0; } }
    function levelDownIfNeeded() { if (wrongStreak>=3 && tierIndex>0)               { tierIndex--; wrongStreak=0; } }

    function submitAnswer() {
      if (mode === 'abc') { submitWordAnswer(); return; }
      if (mode === 'clock') { return; } // clock answers via button press only
      if (!answerDigits.trim()) { setFeedback('I don\u2019t see your answer. Is it hiding? \uD83E\uDD0D','green'); return; }
      const userAns = parseInt(answerDigits,10);
      if (userAns===expectedAnswer) {
        triesThisQuestion=0; rightStreak++; wrongStreak=0;
        awardHeart();
        if (!document.getElementById('feedback-text').innerText) setFeedback('Correct!','green');
        levelUpIfNeeded(); generateQuestion(); return;
      }
      triesThisQuestion++;
      if (triesThisQuestion<MAX_TRIES) { setFeedback('Oops! Try again \uD83E\uDEE0','green'); return; }
      setFeedback('We\u2019ll come back to this \u2014 you\u2019re close though!','#8a2be2');
      wrongStreak++; rightStreak=0; levelDownIfNeeded(); generateQuestion();
    }

    // ================================================================
    //  BANK
    // ================================================================

    let showAllTransactions = false;

    function toggleTxView() {
      showAllTransactions = !showAllTransactions;
      document.getElementById('tx-toggle').innerText   = showAllTransactions ? 'View Recent' : 'View All';
      document.getElementById('tx-subtitle').innerText = showAllTransactions ? 'Showing all transactions.' : 'Showing 10 most recent.';
      renderBank();
    }

    const dollars    = n => `$${Number(n).toFixed(0)}`;
    const formatTime = d => new Date(d).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    const formatDate = d => new Date(d).toLocaleDateString([],{month:'short',day:'numeric'});

    function renderBank() {
      renderTopBar();
      const el = document.getElementById('tx-list');
      el.innerHTML = '';
      if (!transactions.length) {
        const li=document.createElement('li');
        li.style.opacity='0.9'; li.innerText='No transactions yet \u2014 earn $1 by filling the hearts!';
        el.appendChild(li); return;
      }
      const max = showAllTransactions ? transactions.length : Math.min(10,transactions.length);
      for (let i=0;i<max;i++) {
        const tx=transactions[i], li=document.createElement('li');
        li.style.color = tx.type==='deposit' ? '#6bff8a' : '#ff6b6b';
        li.textContent = `${tx.type==='deposit'?'+':'-'}${dollars(tx.amount)} \u2014 ${tx.type==='deposit'?'Deposit':(tx.note||'Purchase')} \u2014 ${formatDate(tx.at)} \u2022 ${formatTime(tx.at)}`;
        el.appendChild(li);
      }
    }

    // ================================================================
    //  SHOP
    // ================================================================

    function renderShop() {
      const listEl = document.getElementById('shop-list');
      listEl.innerHTML = '';
      for (const item of SHOP_ITEMS) {
        let alreadyOwned = !item.unlimited && ownedItems.has(item.id);
        if (item.type === 'paintbox') {
          const unrevealed = PAINT_ITEMS.filter(p => !ownedItems.has(p.id)).length;
          const cansHeld = inventory['paint_can'] || 0;
          alreadyOwned = unrevealed === 0 || cansHeld >= unrevealed;
        }
        const row = document.createElement('div');
        row.className = 'shop-item';

        const img = document.createElement('img');
        img.className = 'shop-icon'; img.src = item.icon; img.alt = item.name;
        img.onerror = function() { this.style.background='#ff69b4'; this.style.opacity='0.6'; };

        const info = document.createElement('div');
        info.className = 'shop-info';
        info.innerHTML = `<div class="shop-name">${item.name}</div><div class="shop-desc">${item.desc}</div>`;

        const btn = document.createElement('button');
        btn.className = 'buy-btn';
        const canAfford = money >= item.price;
        btn.disabled = alreadyOwned || !canAfford;
        if (item.type === 'paintbox' && alreadyOwned) {
          const allDone = PAINT_ITEMS.every(p => ownedItems.has(p.id));
          btn.innerText = allDone ? 'Owned \u2713' : 'Open it first!';
        } else {
          btn.innerText = alreadyOwned ? 'Owned \u2713' : ('$' + item.price);
        }
        btn.title = (!canAfford && !alreadyOwned) ? 'Not enough money!' : '';
        btn.onclick = () => buyItem(item.id);

        row.appendChild(img); row.appendChild(info); row.appendChild(btn);
        listEl.appendChild(row);
      }
    }

    function buyItem(itemId) {
      const item = SHOP_ITEMS.find(i => i.id===itemId);
      if (!item) return;
      if (!item.unlimited && ownedItems.has(itemId)) return;
      if (item.type === 'paintbox') {
        const unrevealed = PAINT_ITEMS.filter(p => !ownedItems.has(p.id)).length;
        const cansHeld = inventory['paint_can'] || 0;
        if (unrevealed === 0 || cansHeld >= unrevealed) return;
      }
      if (money < item.price) return;
      money -= item.price;
      if (item.price > 0) {
        transactions.unshift({ type:'deduction', amount:item.price, at:new Date(), note:item.name });
        if (transactions.length > 5000) transactions.length = 5000;
      }
      if (!item.unlimited) ownedItems.add(itemId);
      inventory[itemId] = (inventory[itemId]||0) + (item.qty || 1);
      saveGame();
      renderTopBar();
      renderShop();
    }

    // ================================================================
    //  CLOSET / INVENTORY PANEL
    // ================================================================

    function openCloset() {
      document.getElementById('closet-overlay').style.display = 'block';
      renderClosetInventory();
    }

    function closeCloset() {
      document.getElementById('closet-overlay').style.display = 'none';
    }

    function renderClosetInventory() {
      const panel = document.getElementById('closet-inv-panel');
      panel.innerHTML = '';

      const allIds = Object.keys(inventory).filter(id => (inventory[id]||0) > 0);

      if (!allIds.length) {
        const e=document.createElement('div'); e.className='inv-empty';
        e.innerText='Nothing here! Visit the Shop \u2B06'; panel.appendChild(e); return;
      }

      const wearables   = allIds.filter(id => { const d=getItemDef(id); return d&&d.type==='wearable'; });
      const consumables = allIds.filter(id => { const d=getItemDef(id); return d&&d.type==='consumable'; });
      const blindboxes  = allIds.filter(id => { const d=getItemDef(id); return d&&(d.type==='blindbox'||d.type==='paintbox'); });
      const paints      = PAINT_ITEMS.filter(p => ownedItems.has(p.id)).map(p => p.id);
      const posters     = allIds.filter(id => { const d=getItemDef(id); return d&&d.type==='poster'; });
      const keychains   = allIds.filter(id => KEYCHAIN_ITEMS.some(k=>k.id===id));

      function section(label, ids, buildTileFn) {
        if (!ids.length) return;
        const lbl = document.createElement('div');
        lbl.className='closet-section-label'; lbl.innerText=label;
        panel.appendChild(lbl);
        const grid = document.createElement('div');
        grid.className='inv-grid';
        ids.forEach(id => { const t=buildTileFn(id); if(t) grid.appendChild(t); });
        panel.appendChild(grid);
      }

      const activeConsumableSlots = ['hair','body','tank','legs','eyes','smile'].filter(slot => {
        const id = equipped[slot];
        if (!id) return false;
        const def = getItemDef(id);
        return def && def.type === 'consumable';
      });
      if (activeConsumableSlots.length) {
        const lbl = document.createElement('div');
        lbl.className = 'closet-section-label'; lbl.innerText = '\u2728 Wearing Now';
        panel.appendChild(lbl);
        const grid = document.createElement('div');
        grid.className = 'inv-grid';
        activeConsumableSlots.forEach(slot => {
          const id = equipped[slot];
          const def = getItemDef(id);
          if (!def) return;
          const tile = buildTile(def, true);
          tile.title = 'Tap to remove';
          tile.onclick = () => removeConsumableEffect(slot);
          grid.appendChild(tile);
        });
        panel.appendChild(grid);
      }

      section('\uD83D\uDC55 Clothes', wearables, id => {
        const def = getItemDef(id); if (!def) return null;
        const isOn = Object.values(equipped).includes(id);
        const tile = buildTile(def, isOn);
        tile.onclick = () => toggleEquip(id);
        tile.title = isOn ? 'Click to take off' : 'Click to wear';
        return tile;
      });

      section('\uD83D\uDC84 Beauty', consumables, id => {
        const def=getItemDef(id); if (!def) return null;
        const cnt=inventory[id]||0;
        const tile=buildTile(def,false,cnt>1?cnt:0);
        tile.title='Click to apply!';
        tile.onclick = () => applyConsumable(id);
        return tile;
      });

      section('\uD83C\uDF81 Boxes', blindboxes, id => {
        const def=getItemDef(id); if (!def) return null;
        const cnt=inventory[id]||0;
        const tile=buildTile(def,false,cnt>1?cnt:0);
        tile.title='Click to open!';
        if (def.type==='blindbox') tile.onclick=()=>openBlindBox();
        if (def.type==='paintbox') tile.onclick=()=>openPaintCan();
        return tile;
      });

      section('\uD83D\uDD11 Keychains', keychains, id => {
        const def=getItemDef(id); if (!def) return null;
        const cnt=inventory[id]||0;
        const tile=buildTile(def,false,cnt>1?cnt:0);
        tile.draggable=true;
        tile.title='Drag into the room to place!';
        tile.addEventListener('dragstart', e=>startDragKeychain(e,id));
        tile.addEventListener('dragend',   ()=>endDragKeychain());
        tile.addEventListener('touchstart', e=>touchStartClosetDrag(e,id,'closet-keychain'), {passive:false});
        return tile;
      });

      if (paints.length) {
        const lbl = document.createElement('div');
        lbl.className='closet-section-label'; lbl.innerText='\uD83C\uDFA8 Paint';
        panel.appendChild(lbl);
        const grid = document.createElement('div');
        grid.className='inv-grid';
        paints.forEach(id => {
          const def = PAINT_ITEMS.find(p => p.id === id);
          if (!def) return;
          const isOn = activePaint === id;
          const tile = buildTile(def, isOn);
          tile.onclick = () => togglePaint(id);
          tile.title = isOn ? 'Click to remove paint' : 'Click to paint room';
          grid.appendChild(tile);
        });
        panel.appendChild(grid);
      }

      section('\uD83D\uDDBC Decor', posters, id => {
        const def=getItemDef(id); if (!def) return null;
        const cnt=inventory[id]||0;
        const tile=buildTile(def,false,cnt>1?cnt:0);
        tile.draggable=true;
        tile.title='Drag into the room to place!';
        tile.addEventListener('dragstart', e=>startDragKeychain(e,id));
        tile.addEventListener('dragend',   ()=>endDragKeychain());
        tile.addEventListener('touchstart', e=>touchStartClosetDrag(e,id,'closet-poster'), {passive:false});
        return tile;
      });
    }

    function buildTile(def, isEquipped, badgeCount) {
      const tile = document.createElement('div');
      tile.className = 'inv-tile' + (isEquipped ? ' equipped' : '');
      tile.dataset.itemId = def.id;

      const img = document.createElement('img');
      img.src = def.icon; img.alt = def.name;
      img.onerror = function() {
        this.style.display='none';
        tile.style.background='#ff69b4';
        tile.style.fontSize='7px'; tile.style.color='#fff'; tile.style.padding='2px';
        tile.innerText=def.name;
      };
      tile.appendChild(img);

      if (badgeCount > 0) {
        const b=document.createElement('div'); b.className='badge'; b.innerText=badgeCount; tile.appendChild(b);
      }
      return tile;
    }

    // ================================================================
    //  EQUIP SYSTEM (wearables)
    // ================================================================

    function toggleEquip(itemId) {
      const item = SHOP_ITEMS.find(i => i.id===itemId);
      if (!item || item.type!=='wearable') return;
      const slot = item.slot;
      const overlay = document.getElementById(`char-${slot}-overlay`);
      if (!overlay) return;
      const baseEl = document.getElementById(BASE_LAYER_MAP[slot]);

      if (equipped[slot] === itemId) {
        equipped[slot] = null;
        overlay.src=''; overlay.style.display='none';
        if (baseEl) baseEl.style.display='';
      } else {
        equipped[slot] = itemId;
        overlay.src = item.src;
        overlay.style.display='';
        if (baseEl) baseEl.style.display='none';
      }
      saveGame();
      renderClosetInventory();
    }

    const BASE_LAYER_MAP = {
      eyes:  'char-eyes-base',
      smile: 'char-smile-base',
    };

    function applyEquipped() {
      ['hair','body','tank','legs','shoes','eyes','smile'].forEach(slot => {
        const overlay = document.getElementById(`char-${slot}-overlay`);
        if (!overlay) return;
        const id = equipped[slot];
        if (id) {
          const def = getItemDef(id);
          if (def&&def.src) { overlay.src=def.src; overlay.style.display=''; }
          const baseId = BASE_LAYER_MAP[slot];
          if (baseId) { const b=document.getElementById(baseId); if(b) b.style.display='none'; }
        } else {
          overlay.src=''; overlay.style.display='none';
          const baseId = BASE_LAYER_MAP[slot];
          if (baseId) { const b=document.getElementById(baseId); if(b) b.style.display=''; }
        }
      });
    }

    function removeConsumableEffect(slot) {
      equipped[slot] = null;
      const overlay = document.getElementById(`char-${slot}-overlay`);
      if (overlay) { overlay.src=''; overlay.style.display='none'; }
      const baseId = BASE_LAYER_MAP[slot];
      if (baseId) { const b=document.getElementById(baseId); if(b) b.style.display=''; }
      saveGame();
      renderClosetInventory();
    }

    // ================================================================
    //  CONSUMABLES
    // ================================================================

    let currentDragConsumable = null;

    function startDragConsumable(e, itemId) {
      currentDragConsumable = itemId;
      e.dataTransfer.effectAllowed = 'move';
      document.getElementById('char-drop-zone').classList.add('drag-active');
    }

    function endDragConsumable() {
      currentDragConsumable = null;
      document.getElementById('char-drop-zone').classList.remove('drag-active');
    }

    function applyConsumable(itemId) {
      const item = SHOP_ITEMS.find(i => i.id===itemId);
      if (!item||item.type!=='consumable') return;
      if (!inventory[itemId]||inventory[itemId]<=0) return;
      inventory[itemId]--;
      if (inventory[itemId]<=0) delete inventory[itemId];
      equipped[item.slot] = itemId;
      const overlay = document.getElementById(`char-${item.slot}-overlay`);
      if (overlay) { overlay.src=item.src; overlay.style.display=''; }
      const baseId = BASE_LAYER_MAP[item.slot];
      if (baseId) { const b=document.getElementById(baseId); if(b) b.style.display='none'; }
      saveGame();
      renderClosetInventory();
    }

    function setupCharDropZone() {
      const zone = document.getElementById('char-drop-zone');
      zone.addEventListener('dragover', e => { if (currentDragConsumable) e.preventDefault(); });
      zone.addEventListener('drop', e => {
        e.preventDefault();
        if (currentDragConsumable) {
          applyConsumable(currentDragConsumable);
          currentDragConsumable=null;
          zone.classList.remove('drag-active');
        }
      });
    }

    // ================================================================
    //  BLIND BOX REVEAL ANIMATION
    // ================================================================

    function openBlindBox() {
      if (!inventory['blind_box']||inventory['blind_box']<=0) return;
      inventory['blind_box']--;
      if (inventory['blind_box']<=0) delete inventory['blind_box'];

      const pool = KEYCHAIN_ITEMS.filter(k => !ownedItems.has(k.id));
      const prize = (pool.length ? pool : KEYCHAIN_ITEMS)[Math.floor(Math.random() * (pool.length || KEYCHAIN_ITEMS.length))];

      const reveal   = document.getElementById('blindbox-reveal');
      const animImg  = document.getElementById('blindbox-anim-img');
      const nameEl   = document.getElementById('blindbox-reveal-name');
      const closeBtn = document.getElementById('blindbox-close-btn');

      animImg.src = 'blind_box_icon.png';
      animImg.className = '';
      nameEl.className = ''; nameEl.innerText = '';
      closeBtn.style.display = 'none';
      reveal.classList.add('active');
      reveal.dataset.canClose = 'false';

      setTimeout(() => animImg.classList.add('wiggling'), 80);

      setTimeout(() => {
        animImg.classList.remove('wiggling');
        void animImg.offsetWidth;
        animImg.src = prize.icon;
        animImg.classList.add('popping');
        nameEl.innerText = `You got a ${prize.name}! \uD83C\uDF89`;
        setTimeout(() => nameEl.classList.add('show'), 150);
        closeBtn.style.display = '';
        reveal.dataset.canClose = 'true';

        ownedItems.add(prize.id);
        inventory[prize.id] = (inventory[prize.id]||0)+1;
        saveGame();
        renderClosetInventory();
      }, 3000);
    }

    function closeBlindboxReveal() {
      const reveal = document.getElementById('blindbox-reveal');
      if (reveal.dataset.canClose === 'false') return;
      document.getElementById('blindbox-anim-img').style.display = '';
      reveal.classList.remove('active');
    }

    // ================================================================
    //  PAINT CAN REVEAL
    // ================================================================

    function openPaintCan() {
      if (!inventory['paint_can'] || inventory['paint_can'] <= 0) return;

      const nextPaint = PAINT_ITEMS.find(p => !ownedItems.has(p.id));
      if (!nextPaint) return;

      inventory['paint_can']--;
      if (inventory['paint_can'] <= 0) delete inventory['paint_can'];

      const reveal   = document.getElementById('blindbox-reveal');
      const animImg  = document.getElementById('blindbox-anim-img');
      const nameEl   = document.getElementById('blindbox-reveal-name');
      const closeBtn = document.getElementById('blindbox-close-btn');

      animImg.src = 'paintcan_icon.png';
      animImg.style.display = '';
      animImg.className = '';
      nameEl.className = ''; nameEl.innerText = '';
      closeBtn.style.display = 'none';
      reveal.classList.add('active');
      reveal.dataset.canClose = 'false';

      setTimeout(() => animImg.classList.add('wiggling'), 80);

      setTimeout(() => {
        animImg.classList.remove('wiggling');
        animImg.style.display = 'none';
        nameEl.innerText = `${nextPaint.name}! \uD83C\uDFA8`;
        setTimeout(() => nameEl.classList.add('show'), 150);
        closeBtn.style.display = '';
        reveal.dataset.canClose = 'true';

        ownedItems.add(nextPaint.id);
        activePaint = nextPaint.id;
        applyPaint();
        saveGame();
        renderClosetInventory();
      }, 3000);
    }

    // ================================================================
    //  PAINT SYSTEM
    // ================================================================

    function togglePaint(itemId) {
      const item = PAINT_ITEMS.find(i => i.id === itemId);
      if (!item) return;
      const overlay = document.getElementById('room-paint-overlay');
      if (!overlay) return;

      if (activePaint === itemId) {
        activePaint = null;
        overlay.src = ''; overlay.style.display = 'none';
      } else {
        activePaint = itemId;
        overlay.src = item.src; overlay.style.display = '';
      }
      saveGame();
      renderClosetInventory();
    }

    function applyPaint() {
      const overlay = document.getElementById('room-paint-overlay');
      if (!overlay) return;
      if (activePaint) {
        const item = PAINT_ITEMS.find(i => i.id === activePaint);
        if (item) { overlay.src = item.src; overlay.style.display = ''; }
      } else {
        overlay.src = ''; overlay.style.display = 'none';
      }
    }

    // ================================================================
    //  ROOM ITEMS
    // ================================================================

    let currentDragKeychain = null;
    let draggingPlacedId    = null;

    function startDragKeychain(e, itemId) {
      currentDragKeychain = itemId;
      e.dataTransfer.effectAllowed = 'copy';
    }

    function endDragKeychain() { currentDragKeychain = null; }

    function setupRoomDrop() {
      const roomStage = document.getElementById('room-stage');

      roomStage.addEventListener('dragover', e => {
        if (currentDragKeychain || draggingPlacedId) {
          e.preventDefault();
          e.dataTransfer.dropEffect = currentDragKeychain ? 'copy' : 'move';
        }
      });

      roomStage.addEventListener('drop', e => {
        e.preventDefault();
        const rect = roomStage.getBoundingClientRect();
        const xPct = (e.clientX - rect.left) / rect.width  * 100;
        const yPct = (e.clientY - rect.top)  / rect.height * 100;

        if (currentDragKeychain) {
          const id = currentDragKeychain;
          if (inventory[id] > 0) {
            inventory[id]--;
            if (inventory[id]<=0) delete inventory[id];
            instanceCounter++;
            const ri = { id, instanceId:instanceCounter, xPct, yPct };
            roomItems.push(ri);
            renderPlacedItem(ri);
            saveGame();
            renderClosetInventory();
          }
          currentDragKeychain = null;
        } else if (draggingPlacedId) {
          const ri = roomItems.find(r => r.instanceId===draggingPlacedId);
          if (ri) {
            ri.xPct = xPct; ri.yPct = yPct;
            const el = document.querySelector(`.placed-item[data-instance="${draggingPlacedId}"]`);
            if (el) { el.style.left=xPct+'%'; el.style.top=yPct+'%'; }
            saveGame();
          }
          draggingPlacedId = null;
        }
      });
    }

    function renderPlacedItem(ri) {
      const def = KEYCHAIN_ITEMS.find(k => k.id===ri.id) || SHOP_ITEMS.find(s => s.id===ri.id && s.type==='poster');
      if (!def) return;
      const layer = document.getElementById('items-layer');
      const img = document.createElement('img');
      img.className = 'placed-item';
      if (ri.id === 'skull_lamp') img.classList.add('glow-lamp');
      const itemDef = SHOP_ITEMS.find(s => s.id === ri.id && s.type === 'poster');
      if (itemDef && ri.id.startsWith('poster_')) img.classList.add('poster-size');
      img.src       = def.src;
      img.alt       = def.name;
      img.dataset.instance = ri.instanceId;
      img.style.left = ri.xPct + '%';
      img.style.top  = ri.yPct + '%';
      img.title = `${def.name} \u2014 double-click to return to closet`;
      img.draggable = true;
      img.onerror = function() { this.style.background='#ffb3de'; this.style.borderRadius='4px'; };

      img.addEventListener('dragstart', e => {
        e.stopPropagation();
        draggingPlacedId = ri.instanceId;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(ri.instanceId));
      });
      img.addEventListener('dragend', () => {});

      img.addEventListener('dblclick', () => {
        inventory[ri.id] = (inventory[ri.id]||0)+1;
        roomItems = roomItems.filter(r => r.instanceId!==ri.instanceId);
        img.remove();
        saveGame();
        renderClosetInventory();
      });

      img.addEventListener('touchstart', e => touchStartPlacedItem(e, ri), {passive:false});

      layer.appendChild(img);
    }

    function applyRoomItems() {
      document.querySelectorAll('.placed-item').forEach(el => el.remove());
      roomItems.forEach(ri => renderPlacedItem(ri));
    }

    // ================================================================
    //  TOUCH DRAG SUPPORT
    // ================================================================

    let touchDragType = null;
    let touchDragItemId = null;
    let touchDragInstanceId = null;
    let touchDragActive = false;
    let touchStartX = 0, touchStartY = 0;

    const ghost = document.getElementById('touch-drag-ghost');

    function showGhost(src, x, y) {
      ghost.src = src;
      ghost.style.left = x + 'px';
      ghost.style.top  = y + 'px';
      ghost.style.display = 'block';
    }

    function moveGhost(x, y) {
      ghost.style.left = x + 'px';
      ghost.style.top  = y + 'px';
    }

    function hideGhost() {
      ghost.style.display = 'none';
      ghost.src = '';
    }

    function touchStartClosetDrag(e, itemId, type) {
      if (e.touches.length !== 1) return;
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchDragItemId = itemId;
      touchDragType = type;
      touchDragActive = false;

      const onMove = (ev) => {
        const mt = ev.touches[0];
        const dx = Math.abs(mt.clientX - touchStartX);
        const dy = Math.abs(mt.clientY - touchStartY);
        if (!touchDragActive && (dx > 8 || dy > 8)) {
          touchDragActive = true;
          ev.preventDefault();
          const def = getItemDef(itemId);
          if (def) showGhost(def.icon || def.src, mt.clientX, mt.clientY);
        }
        if (touchDragActive) {
          ev.preventDefault();
          moveGhost(mt.clientX, mt.clientY);
        }
      };

      const onEnd = (ev) => {
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        document.removeEventListener('touchcancel', onEnd);

        if (!touchDragActive) {
          touchDragType = null;
          touchDragItemId = null;
          return;
        }

        hideGhost();

        const ct = ev.changedTouches[0];
        const roomStage = document.getElementById('room-stage');
        const rect = roomStage.getBoundingClientRect();

        if (ct.clientX >= rect.left && ct.clientX <= rect.right &&
            ct.clientY >= rect.top  && ct.clientY <= rect.bottom) {

          const xPct = (ct.clientX - rect.left) / rect.width * 100;
          const yPct = (ct.clientY - rect.top) / rect.height * 100;
          const id = touchDragItemId;

          if (inventory[id] > 0) {
            inventory[id]--;
            if (inventory[id] <= 0) delete inventory[id];
            instanceCounter++;
            const ri = { id, instanceId: instanceCounter, xPct, yPct };
            roomItems.push(ri);
            renderPlacedItem(ri);
            saveGame();
            renderClosetInventory();
          }
        }

        touchDragType = null;
        touchDragItemId = null;
        touchDragActive = false;
      };

      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
      document.addEventListener('touchcancel', onEnd);
    }

    let lastPlacedTap = 0;

    function touchStartPlacedItem(e, ri) {
      if (e.touches.length !== 1) return;
      e.stopPropagation();
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchDragActive = false;
      touchDragInstanceId = ri.instanceId;

      const imgEl = e.currentTarget;

      const onMove = (ev) => {
        const mt = ev.touches[0];
        const dx = Math.abs(mt.clientX - touchStartX);
        const dy = Math.abs(mt.clientY - touchStartY);
        if (!touchDragActive && (dx > 8 || dy > 8)) {
          touchDragActive = true;
          ev.preventDefault();
          const def = KEYCHAIN_ITEMS.find(k => k.id === ri.id) || SHOP_ITEMS.find(s => s.id === ri.id && s.type === 'poster');
          if (def) showGhost(def.src, mt.clientX, mt.clientY);
          imgEl.style.opacity = '0.3';
        }
        if (touchDragActive) {
          ev.preventDefault();
          moveGhost(mt.clientX, mt.clientY);
        }
      };

      const onEnd = (ev) => {
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
        document.removeEventListener('touchcancel', onEnd);

        imgEl.style.opacity = '';
        hideGhost();

        if (!touchDragActive) {
          const now = Date.now();
          if (now - lastPlacedTap < 400 && touchDragInstanceId === ri.instanceId) {
            inventory[ri.id] = (inventory[ri.id] || 0) + 1;
            roomItems = roomItems.filter(r => r.instanceId !== ri.instanceId);
            imgEl.remove();
            saveGame();
            renderClosetInventory();
            lastPlacedTap = 0;
          } else {
            lastPlacedTap = now;
          }
          touchDragInstanceId = null;
          return;
        }

        const ct = ev.changedTouches[0];
        const roomStage = document.getElementById('room-stage');
        const rect = roomStage.getBoundingClientRect();

        if (ct.clientX >= rect.left && ct.clientX <= rect.right &&
            ct.clientY >= rect.top  && ct.clientY <= rect.bottom) {
          const xPct = (ct.clientX - rect.left) / rect.width * 100;
          const yPct = (ct.clientY - rect.top) / rect.height * 100;
          const item = roomItems.find(r => r.instanceId === ri.instanceId);
          if (item) {
            item.xPct = xPct;
            item.yPct = yPct;
            imgEl.style.left = xPct + '%';
            imgEl.style.top  = yPct + '%';
            saveGame();
          }
        }

        touchDragInstanceId = null;
        touchDragActive = false;
      };

      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
      document.addEventListener('touchcancel', onEnd);
    }

    // ================================================================
    //  ROOM SETUP
    // ================================================================

    function setupRoom() {
      const hitbox  = document.getElementById('closet-hitbox');
      const overlay = document.getElementById('closet-overlay');
      if (!hitbox||!overlay) return;

      hitbox.addEventListener('click', openCloset);

      overlay.addEventListener('click', e => {
        if (!e.target.closest('#closet-inv-panel') && !e.target.closest('#closet-close-btn')) {
          closeCloset();
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key==='Escape') { closeCloset(); closeBlindboxReveal(); }
      });

      setupCharDropZone();
      setupRoomDrop();
    }

    // ================================================================
    //  CALCULATOR EYE ANIMATIONS
    // ================================================================

    const CALC_ANIMS = [
      { src: 'wink.png',         duration: 2000 },
      { src: 'kissy.png',        duration: 2000 },
      { src: 'wink_tongue.png',  duration: 2000 },
      { src: 'blink_tongue.png', duration: 2000 },
    ];
    let calcAnimTimer = null;
    let calcAnimFirstTimer = null;
    let calcAnimPlaying = false;
    let calcAnimDoneTimer = null;

    function resetCalcAnim() {
      const staticEye = document.getElementById('calc-eye-static');
      const animImg   = document.getElementById('calc-eye-anim');
      if (calcAnimDoneTimer) { clearTimeout(calcAnimDoneTimer); calcAnimDoneTimer = null; }
      animImg.removeAttribute('src');
      animImg.style.display = 'none';
      staticEye.style.display = '';
      calcAnimPlaying = false;
    }

    function playCalcAnimation() {
      if (calcAnimPlaying) return;
      calcAnimPlaying = true;

      const staticEye = document.getElementById('calc-eye-static');
      const animImg   = document.getElementById('calc-eye-anim');
      const chosen    = CALC_ANIMS[Math.floor(Math.random() * CALC_ANIMS.length)];

      animImg.src = chosen.src + '?t=' + Date.now();
      animImg.style.display = '';
      staticEye.style.display = 'none';

      calcAnimDoneTimer = setTimeout(resetCalcAnim, chosen.duration);
    }

    function startCalcAnimTimers() {
      stopCalcAnimTimers();
      resetCalcAnim();
      calcAnimFirstTimer = setTimeout(() => {
        playCalcAnimation();
        calcAnimTimer = setInterval(playCalcAnimation, 5 * 60 * 1000);
      }, 10 * 1000);
    }

    function stopCalcAnimTimers() {
      if (calcAnimFirstTimer) { clearTimeout(calcAnimFirstTimer); calcAnimFirstTimer = null; }
      if (calcAnimTimer) { clearInterval(calcAnimTimer); calcAnimTimer = null; }
      if (calcAnimDoneTimer) { clearTimeout(calcAnimDoneTimer); calcAnimDoneTimer = null; }
    }

    // ================================================================
    //  INIT
    // ================================================================

    loadGame();
    setupRoom();
    renderTopBar();
    setMode(mode);
    applyEquipped();
    applyRoomItems();
    applyPaint();
    startCalcAnimTimers();

  </script>
</body>
</html>
